appId: com.novel02.starfall
productName: 星落戰紀
copyright: Copyright (c) 2026
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!node_modules/**/*"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 星落戰紀
