# 菁英單位（英雄 / 首領）範本 — 以 EliteTemplate 模型驗證（見 ../schema/models.py）
# 開局選角時雙方各從己方陣營選 5–8 名（elite_roster_size），實例化為 EliteInstance。
# aura = 對同據點友軍的光環倍率；growth = 每級成長；abilities 由引擎效果套用表解讀。
# 新增菁英只需在此增條目，不必改 schema。鍵 = 菁英 id。

# ===== 人類英雄池 =====
saintess:
  id: saintess
  name: 聖女
  side: human
  attack: 14
  defense: 18
  hp: 60
  upkeep: 2.0
  aura: {ally_hp_mult: 1.20, ally_defense_mult: 1.10}
  abilities: [bless]
  growth: {hp_per_level: 6, ally_hp_mult_per_level: 0.03}
  xp_per_level: 10
  max_level: 5
  description: 治療型英雄，光環大幅提升同據點友軍有效 HP，bless 額外回復。

general:
  id: general
  name: 女將軍
  side: human
  attack: 26
  defense: 18
  hp: 55
  upkeep: 2.5
  aura: {ally_attack_mult: 1.25}
  abilities: [rally]
  growth: {attack_per_level: 2.0, ally_attack_mult_per_level: 0.03}
  xp_per_level: 10
  max_level: 6
  description: 進攻型統帥，光環提升全據點友軍攻擊，rally 鼓舞士氣。

archmage:
