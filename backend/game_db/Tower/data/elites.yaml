  xp_per_level: 10
  max_level: 5
  description: 偵察型英雄，scout 提升該據點視野、ambush 先制削弱進攻方。

valkyrie_lord:
  id: valkyrie_lord
  name: 女武神統領
  side: human
  attack: 28
  defense: 20
  hp: 66
  upkeep: 3.5
  aura: {ally_attack_mult: 1.18, ally_hp_mult: 1.08}
  abilities: [flight, elite]
  growth: {attack_per_level: 2.2, hp_per_level: 5, ally_attack_mult_per_level: 0.025}
  xp_per_level: 13
  max_level: 7
  description: 頂尖女武神，攻擊與 HP 雙光環，飛行兼具高自身戰力。

