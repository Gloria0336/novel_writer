# 據點類型 / 地形 → 預設加成組合
# 每個值為 NodeBonus 清單（見 ../schema/models.py）。
# 地圖生成時依節點類型 / 地形 tag 套上對應組合。鍵 = 類型或地形 tag。

capital:
  - {type: resource_yield, magnitude: 8, resource: combat_resource, description: 王城產出戰鬥資源}
  - {type: research_rate, magnitude: 0.30, description: 王城學院加速研究}
  - {type: terrain_defense, magnitude: 1.4, description: 王城天險}

city:
  - {type: resource_yield, magnitude: 4, resource: combat_resource, description: 城市產出}
  - {type: recruit_rate, magnitude: 0.20, description: 城市兵營}

main_nest:
  - {type: resource_yield, magnitude: 6, resource: monster_source, description: 主巢魔物源}
  - {type: recruit_rate, magnitude: 0.30, description: 主巢孵化池}

sub_nest:
  - {type: resource_yield, magnitude: 3, resource: monster_source, description: 副巢魔物源}
  - {type: recruit_rate, magnitude: 0.15, description: 副巢孵化}

tribe:
  - {type: recruit_rate, magnitude: 0.10, description: 部落補員}

# --- 中立地形（依 tag 套用，鼓勵爭奪） ---
mountain:
  - {type: terrain_defense, magnitude: 1.5, description: 山地易守}
  - {type: vision, magnitude: 0.25, description: 高地視野，降低迷霧}

marsh:
  - {type: terrain_defense, magnitude: 1.3, description: 沼澤遲滯}
  - {type: movement, magnitude: -0.25, description: 沼澤拖慢行軍}

mine:
  - {type: resource_yield, magnitude: 5, resource: combat_resource, description: 礦脈}

watchtower:
  - {type: vision, magnitude: 0.40, description: 瞭望塔大幅降低迷霧}

crossroads:
  - {type: movement, magnitude: 0.30, description: 道路樞紐加速行軍}
