  - id: mountain-demon
    name: 山妖
    aliases:
      - 佔據大山的妖物
    role: ch001 主要威脅
    age: 未公開
    species: 妖族或大型妖物
    occupation: 佔據深山與靈泉的掠食者
    appearance_public: >
      體型龐大，脊背高聳，肌肉如山石，渾身覆暗褐色硬甲，縫隙長出粗硬毛束；
      兩眼混濁發黃，飲水時能使湖面與碎石震動。
    appearance_current: >
      ch001 已於深山湖畔被山獵人斬首。
    personality:
      - 傲慢
      - 掠食性強
      - 首次受傷時憤怒且不可置信
    speech_style:
      baseline: 以嘶吼與嚎叫表現。
      under_stress: 震怒、慘嚎。
      humor: 無。
    abilities:
      - 巨大肉體力量
      - 硬甲防禦
      - 以山中走獸、靈泉與村民為食
      - 涎液具有高熱或腐蝕性，滴落地面會砸出冒熱氣凹洞
    current_status: >
      ch001 死亡，威脅暫時解除。
    progressions:
      - at_chapter: ch001
        status: 被骨箭射中左眼。
      - at_chapter: ch001
        status: 右腿筋腱被切斷後失衡跪地。
      - at_chapter: ch001
        status: 喉嚨弱點遭大太刀切開，頭顱落地。
    goals:
      - 佔據深山資源
      - 捕食山中生物與村民
    secrets:
