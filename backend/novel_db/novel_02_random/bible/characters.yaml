characters:
  - id: mountain-hunter
    name: 山獵人
    aliases:
      - 獵人
      - 熊一般的大漢
    role: 短篇一主角 / 討伐者
    age: 未公開
    species: 未公開
    occupation: 接受懸賞的獵人或武裝討伐者
    appearance_public: >
      高挑壯碩，長髮與鬍鬚久未整理，遮住大半面容；身穿厚重熊皮獵裝，
      遠看像一頭熊，背負長弓與大太刀。
    appearance_current: >
      ch001 清晨獨自進入西邊群山，熊皮獵裝沾滿晨霧，完成討伐後拭淨刀身並離開湖畔。
    personality:
      - 冷漠寡言
      - 行動沉穩
      - 對危險近乎無動於衷
      - 戰鬥時乾淨精準
    speech_style:
      baseline: 極少說話，回答短促直接。
      under_stress: 正文尚未出現失控或明顯情緒波動。
      humor: 未出現。
    abilities:
      - 以獸骨追蹤山妖方位
      - 使用骨箭與長弓進行精準狙擊
      - 使用大太刀近身斬殺大型妖物
      - 山地行動能力極強，能在碎石、樹枝與巨型敵人身上快速換位
    current_status: >
      ch001 已斬殺佔據深山湖畔的山妖，未久留、未領受村民反應即轉身離開。
    progressions:
      - at_chapter: ch001
        status: 接受老村長最後懸賞，獨自進山。
      - at_chapter: ch001
        status: 在深山湖畔射瞎山妖左眼，破壞其腿部筋腱，最終斬首。
    goals:
      - 完成懸賞任務
      - 未公開的長期目標
    secrets:
      - 真實身分、過往經歷與力量來源尚未公開。
    first_appearance: ch001

