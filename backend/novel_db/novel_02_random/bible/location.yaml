locations:
  - id: main-location
    name: 主要場景名稱
    type: 住處 / 校園 / 公司 / 街區 / 異界
    region: 城市、行政區或更大的地理範圍
    first_appearance: ch001
    summary: >
      這個地點在正文中已成立的功能、樣貌與角色為何會來到這裡。
    atmosphere:
      - 固定會被感知到的聲音、氣味、光線或材質
    narrative_functions:
      - 安全屋 / 衝突現場 / 情報交換 / 儀式空間
    access_constraints:
      - 出入門檻、營業時間、通勤限制、監視風險或危險來源
    linked_people_or_factions:
      - 角色、組織或勢力名稱
    continuity_notes:
      - 方位、樓層、附近地標、移動時間等需要保持一致的資訊
