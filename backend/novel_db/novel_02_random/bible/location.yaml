locations:
  - id: starborne-flat-world
    name: 漂浮於無盡星空之上的平面大陸
    type: 世界 / 平面大陸
    region: 宇宙星空之中
    first_appearance: world-bible
    summary: >
      由創世眾神以星空物質凝聚而成的巨大平面島嶼。現今由兩塊主大陸與中間島群構成，
      大陸邊緣有瀑布般的土石傾入虛空。
    atmosphere:
      - 從宇宙視角看如黑暗海洋中的發光陸地
      - 星光、魔法泉源與古老神話感並存
    narrative_functions:
      - 世界總舞台
      - 創世神話與眾神之戰遺產
      - 次元壁危機的承載空間
    access_constraints:
      - 非一般角色可離開或從外部觀測的尺度
      - 邊緣接續虛空，具高度危險性
    linked_people_or_factions:
      - 創世眾神
      - 七大種族
      - 黑暗次元
    continuity_notes:
      - 世界不是球體，而是漂浮於星空中的巨大平面大陸。

  - id: first-continent-aethlan-empire
    name: 第一大陸 / 艾瑟蘭帝國
    type: 主大陸 / 君主立憲帝國
    region: 兩大陸之一
    first_appearance: world-bible
    summary: >
      以中國地理為原型，中央為廣袤平原丘陵與大陸型氣候，三面臨海。
      由人類、精靈、矮人的三族聯盟共同建立。
    atmosphere:
      - 魔導科技昌明
      - 貴族院與平民院政治角力明顯
      - 邊境和平表象下有魔族侵擾
    narrative_functions:
      - 三族聯盟政治主舞台
      - 人類崛起與精靈主導權衝突
      - 北境魔族侵擾與次元壁滲透線
    access_constraints:
      - 北方高原與南方叢林為半自治少數民族聚居地
      - 北方深處仍有大片未探索土地
      - 邊境魔族勢力多為敵對態勢
    linked_people_or_factions:
      - 艾瑟蘭迪爾家族
      - 三族聯盟
      - 貴族院
      - 平民院
      - 聖殿騎士團
    continuity_notes:
      - 精靈長期掌握貴族院與知識話語權；人類在平民院與軍事上快速上升；矮人掌握工業命脈但政治分裂。

  - id: second-continent-great-league
    name: 第二大陸 / 大聯盟
    type: 主大陸 / 鬆散政治聯盟
    region: 兩大陸之一
    first_appearance: world-bible
    summary: >
      比第一大陸更大且地形複雜，多山、水系縱橫，中央有廣袤沙漠。
      各成員國自願遵守共同公約，但無強制執行機構與統一軍隊。
    atmosphere:
      - 多元但缺乏共同認同
      - 北方純種族國家較多
      - 南方複合勢力與種族混居較常見
    narrative_functions:
      - 多國外交、冒險者文化與種族政治舞台
      - 妖族帝國、人獸王國、多元聯邦等勢力互動區
    access_constraints:
      - 聯盟規範靠自願遵守，跨國協調困難
      - 大國制衡維持現狀，衝突風險潛伏
    linked_people_or_factions:
      - 熊族王國
      - 虎族王國
      - 狐族王國
      - 妖族帝國
      - 人獸王國
      - 多元聯邦
    continuity_notes:
      - 越往北方越多純種族國家；南方以種族混居複合勢力為主。

  - id: middle-sea-islands
    name: 中間海域與島群
    type: 危險海域 / 島群 / 無政府地帶
    region: 兩大陸之間
    first_appearance: world-bible
    summary: >
      兩大陸之間的危險地帶，部分區域是眾神之戰遺留的次元壁薄弱點。
      島群各自為政，海盜文化主導。
    atmosphere:
      - 危機四伏
      - 航路知識即權力
      - 亡命者、流亡者、冒險者混雜
    narrative_functions:
      - 跨陸交通阻礙
      - 海盜與航路控制權衝突
      - 次元異常事件發生區
    access_constraints:
      - 只有極少數已知特定航路可安全通行
      - 海盜勢力可能徵收過路費或直接劫掠
      - 部分區域有空間異常與次元壁薄弱風險
    linked_people_or_factions:
      - 海盜勢力
      - 航海公會
      - 空騎團
    continuity_notes:
      - 船運是跨陸交通主流；飛船速度快但昂貴；空間傳送陣最快也最昂貴，且節點稀少。

  - id: sun-solar-palace
    name: 日宮（太陽神之殿）
    type: 神殿 / 天體
    region: 天空高空，無法接近
    first_appearance: world-bible
    summary: >
      太陽神以神力鑄造的神殿，承載於太陽之上、依固定軌道自主運行。
      太陽神離去後，日宮完好保存，太陽仍熾烈地在既定軌道上運行。
      任何飛行器均無法接近，空騎團高空堡壘亦有已知高度上限；內部是否空置，至今無人知曉。
    atmosphere:
      - 熾烈、神聖、遙不可及
      - 佔星者視其為「太陽神的遺言」，無法被回應的神殿
    narrative_functions:
      - 神明已離去卻遺物仍存的象徵
      - 日月同框（日蝕）時成為宗教詮釋焦點
    access_constraints:
      - 完全無法接近，無任何已知進入方式
      - 高度超過空騎團高空堡壘的已知上限
    linked_people_or_factions:
      - 太陽神（已離去）
      - 空騎團（已知高度極限的參照）
    continuity_notes:
      - 太陽神與月神是唯二以神殿形式留下天體的神明，其他神明未有類似記錄。

  - id: main-moon-broken-palace
    name: 主月（破碎月宮）
    type: 神殿遺跡 / 天體
    region: 天空，依原有軌道運行
    first_appearance: world-bible
    summary: >
      月神最初的神殿，月神死亡時遭受衝擊而破碎。
      碎片靠殘存神力維持引力、在原有軌道自主聚合運行，成為殘缺的月亮。
      銀白色，體積較大，表面有明顯裂痕與缺口，夜晚光芒中可見不規則暗塊。週期 30 天。
    atmosphere:
      - 殘破中仍保有冷白光芒
      - 裂痕與缺口是月神死亡的直接見證
      - 碎片流星雨出現時被視為凶兆
    narrative_functions:
      - 月神之死的視覺見證，每晚可見
      - 大型碎片脫落事件可作為情節觸發點
      - 各地宗教解讀分歧的核心符號
    access_constraints:
      - 無法接近，構成流星雨的碎片具撞擊風險
    linked_people_or_factions:
      - 月神（已死亡）
      - 生命女神（與月神共創女神魔法體系）
    continuity_notes:
      - 月神之名、死因及細節在各文化流傳版本中存在大量出入，是神學與史學爭議核心。
      - 可確認的事實：主月宮在某個時刻破碎了，副月宮完好保留。

  - id: secondary-moon-lunar-palace
    name: 副月（副月宮・新月雛形）
    type: 神殿 / 天體 / 未成形神明
    region: 天空，依原有軌道運行
    first_appearance: world-bible
    summary: >
      月神在持續成長過程中孕育的新月雛形，是尚未完全成形的第二個月神胚胎。
      月神死亡時因尚未成熟而未成為攻擊目標，完好保留至今。
      帶淡藍紫色澤，體積較小，外觀完整無損。週期 20 天。
    atmosphere:
      - 完整且帶冷藍紫光
      - 在殘破主月旁顯得格外刺目
      - 各地宗教對其態度截然不同：敬畏、期待、或試圖干預
    narrative_functions:
      - 未誕生神明的存在，潛在的世界觀衝突核心
      - 「副月凌主月」天象可用作儀式或情節時間錨
      - 各宗教勢力對副月的立場可反映其信仰本質
    access_constraints:
      - 無法接近
    linked_people_or_factions:
      - 月神（孕育者，已死亡）
    continuity_notes:
      - 各地宗教對副月存在根本分歧：有人奉為繼承者、有人畏為不穩定核心、也有人試圖干預其成長進程。

  - id: western-mountain-village
    name: 西邊群山下的村莊
    type: 村莊 / 懸賞起點
    region: 西邊群山山腳
    first_appearance: ch001
    summary: >
      原本山產豐隆，近年因深山山妖佔據大山、捕食走獸與村民而衰敗。
      村莊多次討伐失敗，老村長最後變賣一切請來山獵人。
    atmosphere:
      - 清晨晨霧
      - 村民低聲竊語與絕望氣氛
      - 因人口與經濟流失而衰敗
    narrative_functions:
      - ch001 委託來源
      - 呈現山妖造成的民生代價
      - 山獵人登場場景
    access_constraints:
      - 通往深山的隘口過去有多支討伐團失蹤
      - 村莊資源已幾乎耗盡
    linked_people_or_factions:
      - 老村長
      - 山獵人
      - 山妖
    continuity_notes:
      - 老村長去城裡前尚有驢子，回村時只剩拐杖與山獵人。

  - id: deep-mountain-spirit-lake
    name: 深山湖畔
    type: 靈泉 / 戰鬥場景
    region: 西邊群山深處
    first_appearance: ch001
    summary: >
      位於山坳間，四面嶙峋岩壁與墨綠密林，湖面平靜如磨光石板。
      靈氣在此匯聚，山妖在湖邊飲水並被山獵人斬殺。
    atmosphere:
      - 靈氣濃稠且帶腥甜氣味
      - 山鳥與蟲鳴消失，風過松針聲格外清晰
      - 湖面泛著輕微光澤
    narrative_functions:
      - ch001 決戰地點
      - 靈泉資源與山妖佔據的核心
      - 展示山獵人追蹤、狙擊與近戰能力
    access_constraints:
      - 山路狹窄且多碎石樹根
      - 山妖長期盤踞，普通討伐隊難以抵達或生還
    linked_people_or_factions:
      - 山獵人
      - 山妖
    continuity_notes:
      - 山獵人以獸骨指向西北方找到此地；山妖死亡後靈氣失去依附並散入空氣。

  - id: capital-aethlan
    name: 首都：艾瑟蘭
    type: 城市 / 帝國首都
    region: 第一大陸中部平原，三條主要河流交匯處
    first_appearance: world-bible
    summary: >
      帝國政治、經濟、文化的絕對核心。城市以舊皇宮為圓心向外輻射擴張，
      歷經兩千餘年層疊建設，新舊城區形成清晰的同心圓結構。
    atmosphere:
      - 舊城區石砌莊重、街道狹窄，夜晚燈火克制安靜
      - 新城區魔導管線外露、銀色導管沿拱廊蜿蜒，夜間形成連續藍白光帶
      - 過渡商業區人流最密集，白天政商高速運轉、夜晚酒館劇場密集
    narrative_functions:
      - 帝國政治核心場景（皇宮廣場、貴族院、平民院）
      - 三族聚居差異的縮影
      - 盟約日遊行與年度演說舞台
    access_constraints:
      - 舊城區貴族宅邸有門禁，非受邀者難以進入核心區域
    linked_people_or_factions:
      - 皇室
      - 貴族院（精靈主導）
      - 平民院（人類崛起中）
      - 艾瑟蘭迪爾家族
    continuity_notes:
      - 精靈家族集中於舊城區；人類遍布各處尤以新城區為主；矮人多聚集在靠近工業區與地下倉儲設施的邊緣城區。

  - id: port-city-velkan
    name: 海港城市：維爾坎
    type: 城市 / 海上貿易門戶
    region: 第一大陸東南沿海，依山面海
    first_appearance: world-bible
    summary: >
      帝國最大的海上貿易門戶，面向中間海域的商業咽喉。
      城市沿港灣斜坡層疊而建，從碼頭區一路向上延伸至山脊上的瞭望堡壘。
    atmosphere:
      - 嘈雜、快節奏、對外來者寬容
      - 建築顏色比首都豐富，石砌外牆常塗以暖色灰泥
      - 入夜後港口仍持續運作，魔導起重設備與水上導引燈沿港灣排列
    narrative_functions:
      - 跨陸商業與情報流通核心
      - 種族最複雜的帝國城市（含妖族、獸族社群）
      - 碼頭市集、冒險者公會分支、海盜半公開活動場景
    access_constraints:
      - 海盜出身的商人在此半公開活動，與官方維持微妙默契
    linked_people_or_factions:
      - 商人公會
      - 冒險者公會
      - 海盜勢力
      - 中間海域島群商人
    continuity_notes:
      - 碼頭市集每旬開市三天，來自兩大陸的商品在此集散。維爾坎人以務實著稱，不太在意對方種族或立場，只要交易公平即可。

  - id: academy-city-elno
    name: 學院城：艾爾諾
    type: 城市 / 學術與魔導研究中心
    region: 第一大陸西部丘陵地帶
    first_appearance: world-bible
    summary: >
      古精靈王國的舊都，現為帝國最重要的學術與魔導研究中心。
      城市規模不大但建築密度極高，幾乎每棟建築都有數百年以上的歷史。
      城外有大片精靈聚居的林地，是三族聯盟建立前精靈文明的核心遺址。
    atmosphere:
      - 安靜、秩序、帶著一種對知識的莊重感
      - 細高尖塔、繁複幾何窗花與以星象為主題的浮雕覆蓋公共建築外牆
      - 街道鋪以磨光白石，幾乎保持前帝國時期格局，未曾拓寬
      - 外來者容易感受到無言的審視——不是敵意，而是標準
    narrative_functions:
      - 魔導研究、古籍典藏與精靈學術政治舞台
      - 大圖書館最核心館藏區（非精靈學者不得入內）的政治爭議
      - 老精靈貴族維持古老生活方式的保留地
    access_constraints:
      - 大圖書館入館需資格審核，最核心典藏區非精靈學者不得進入
      - 城中精靈比例遠高於帝國其他城市，外來者受到無形審視
    linked_people_or_factions:
      - 大圖書館
      - 精靈老貴族家族
      - 學者與研究機構
    continuity_notes:
      - 大圖書館部分館藏可追溯至眾神之戰前。魔導科技以最低調的方式整合進古老建築，導管與金屬構件盡量隱藏於牆體之內。非精靈學者不得進入最核心典藏區一事，至今仍是帝國內部政治爭議點。

  - id: northern-aethlan-road
    name: 帝國北上道路
    type: 道路 / 北方交通線
    region: 艾瑟蘭帝國中北部至北境方向
    first_appearance: ch004-1
    summary: >
      由帝都向北延伸的道路系統。越往北，魔物與黑暗能量侵蝕事件越頻繁，
      商隊減少，驛站燈火轉暗，許多村鎮下午即急著關門。
    atmosphere:
      - 乾冷北風
      - 被燒成灰黑色的腐植林
      - 村民與受傷親人聚集在路邊，帶著劫後餘生的緊繃
      - 夜晚像某種會從地平線爬來的威脅
    narrative_functions:
      - 展示黑暗次元滲透已影響帝國內部交通與民生
      - 作為艾爾諾老師教導少年實戰判斷的移動舞台
      - 串接帝都、北方村鎮與黑石城
    access_constraints:
      - 道路附近可能出現腐獸、魔化植物與受黑暗能量侵蝕的魔狼。
      - 普通村鎮與商隊對日落後行動高度保守。
    linked_people_or_factions:
      - elno-honorary-mage
      - unnamed-mage-apprentice
      - adventurers-guild
      - dark-dimension
    continuity_notes:
      - ch004-1 中艾爾諾老師沿途處理的委託顯示，黑暗侵蝕已不是孤立事件。

  - id: blackstone-city
    name: 黑石城
    type: 礦業城市
    region: 艾瑟蘭帝國北上道路沿線
    first_appearance: ch004-1
    summary: >
      熱鬧的礦業城市，城牆不高但厚重，以深灰色石材與銀色金屬骨架構成。
      城外道路被運礦車壓得結實平整，遠處山坡有礦井升降塔與魔導輪盤。
    atmosphere:
      - 煤煙、金屬粉塵、麥酒與熱湯味混在一起
      - 矮人、工人、商隊、冒險者與厚外套居民往來頻繁
      - 魔導輪盤與礦井升降塔像城市呼吸般緩慢運轉
    narrative_functions:
      - 展示矮人與帝國礦業魔導技術的日常化應用
      - 讓少年魔導工程天賦首次明確浮出水面
      - 作為北上旅途中可補給、住宿與採購的城市節點
    access_constraints:
