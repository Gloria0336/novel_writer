canon_outline:
  project_status: active
  current_chapter: ch007
  current_endpoint: 阿強已知情並提出外派專案與新員工證方案，離開後林遠獨自消化羞恥與希望。
  canon_scope:
    covered_chapters:
      - ch001
      - ch002
      - ch003
      - ch004
      - ch005
      - ch006
    note: 僅記錄已寫成正文的 canon 與直接可接續節點。
  chapter_beats:
    - chapter: ch001
      beat: 林遠在雨夜遭遇瀕死車禍，與未知黑影簽約求生。
      outcome: 契約成立，肉身重塑開始。
    - chapter: ch002
      beat: 林遠凌晨醒來，確認自己已被改造成女性化肉身。
      outcome: 身份危機具象化。
    - chapter: ch003
      beat: 燼現身並宣稱契約不可逆，林遠崩潰反抗失敗。
      outcome: 搭檔與同居危機成形。
    - chapter: ch004
      beat: 林遠開始建立偽裝方案，燼正式入住。
      outcome: 主角從崩潰轉入勉強維生。
    - chapter: ch005
      beat: 林遠返工成功但險些露餡，阿強察覺異常。
      outcome: 第一位外部知情候選人出現。
    - chapter: ch006
      beat: 林遠走投無路，決定向阿強求助，並先隔離燼。
      outcome: 秘密即將首次外流。
    - chapter: ch007
      beat: 林遠向阿強坦白變身真相，阿強震驚後仍選擇協助，提出外派專案與偽造員工證方案。
      outcome: 第一位知情盟友成立，短期偽裝新路線成形。
  character_state_snapshot:
    lin-yuan: >
      處於強烈身份失調與求生偽裝期，暫時尚未接受契約現實，
      但已從完全崩潰轉為不得不動腦生存。
    jin: >
      自認掌握局勢，對人類生活抱持旁觀與戲弄態度，
      但實際上已在林遠生活中占據不可忽視的位置。
    a-qiang: >
      已成為第一位知情者，雖然震驚仍選擇站在林遠這邊，
      並開始用自己的人脈與行動力協助掩護。
  near_term_next_steps:
    - 阿強如何實際推動客戶端借調與假員工證
    - 林遠是否能用新身份避開公司熟人
    - 燼對阿強知情與新計畫的態度
    - 阿強何時接觸到真正的超自然現象
  continuity_flags:
    - >
      章節 weekday 存在衝突：ch001 寫事故夜是週五，
      ch005 則把返工當天寫成週五。當前先保留相對事件順序，
      後續修稿再統一。

speculative_long_arc:
  editable: true
  status: author_adjustable_projection
  note: 這一區是根據現有章節與世界觀外推的長線主線，非既定 canon，可自由修改。
  central_questions:
    - 林遠能否在不失去自我的情況下駕馭陰陽契約？
    - 燼究竟是危險的寄生者、必須依靠的盟友，還是更複雜的存在？
    - 一旦獵魔殿察覺林遠的存在，他該站在哪一邊？
  projected_arc:
    - phase: 第一階段／秘密外流與低階入門
      function: >
        阿強成為第一名知情者；林遠從孤立硬撐轉入小隊式求生；
        燼與林遠開始建立最低限度合作。
      likely_material:
        - 阿強從質疑到被迫相信
        - 第一場低強度妖魔事件
        - 林遠第一次主動借用燼的力量
        - 借力後的反噬與需求期初次發作

    - phase: 第二階段／日常崩裂與獵魔殿逼近
      function: >
        讓偽裝生活開始出現裂縫，並把都市暗面、宗教結界、
        妖魔規則與獵魔殿追獵正式拉進主舞台。
      likely_material:
        - 公司或生活圈出現無法再靠口罩掩蓋的異常
        - 獵魔殿的偵測、盤查或誤傷事件
        - 林遠對「人類正派未必會救自己」的信念崩解
        - 燼的過去或魅魔特殊性被揭露一部分

    - phase: 第三階段／契約深化與立場選擇
      function: >
        把情慾、依賴、權力關係與戰鬥代價綁得更深，
        逼林遠正視自己已不再是原本的普通人。
      likely_material:
        - 更高強度的補給與親密交換
        - 式神化作戰的首次完整實戰
        - 林遠逐漸能主動使用能力，但也更難抽離燼
        - 阿強或其他盟友因捲入而受傷，逼出真正抉擇

    - phase: 第四階段／事故真相與終局抉擇
      function: >
        回收車禍、契約、獵魔殿與燼來歷的主線，讓林遠在
        恢復原樣、保留現狀、或重寫契約之間做出最終選擇。
      likely_material:
        - 車禍背後不是純巧合
        - 燼與獵魔殿之間存在舊帳或誤判
        - 林遠發現解除契約的代價遠比想像殘酷
        - 終局選擇決定他要以什麼身分活下去
