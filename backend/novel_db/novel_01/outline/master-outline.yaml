canon_outline:
  project_status: active
  current_chapter: ch028
  current_endpoint: >
    林遠已於 2025/11/12 週三，單獨前往天蘇區東蘇路六十二號支援外勤訪談，
    調查東蘇雜貨貨架後低語與亡妻呼喚聲；他察覺通報老人敘述矛盾與店內時間停滯，
    但被異香／茶飲陷阱削弱，淵念調動受阻，正陷入被捕食危機。
  canon_scope:
    covered_chapters:
      - ch001
      - ch002
      - ch003
      - ch004
      - ch005
      - ch006
      - ch007
