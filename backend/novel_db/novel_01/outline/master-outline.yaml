canon_outline:
  project_status: active
  current_chapter: ch019
  current_endpoint: >
    林遠已於 2025/10/20 正式進入淵聲研究所工作，
    新主線從「保住社會身分」轉向「在研究所與舊城區裡理解超自然世界」。
  canon_scope:
    covered_chapters:
      - ch001
      - ch002
      - ch003
      - ch004
      - ch005
      - ch006
      - ch007
      - ch008
      - ch009
      - ch010
      - ch011
      - ch012
      - ch013
      - ch014
      - ch015
      - ch016
      - ch017
      - ch018
      - ch019
    note: 僅記錄已在正文正式發生的內容。
  chapter_beats:
    - chapter: ch001
      beat: 雨夜車禍與求生交易
      outcome: 林遠在瀕死中與燼締結不可逆契約
    - chapter: ch002
      beat: 凌晨醒來確認女性化肉體
      outcome: 主角的舊身分開始失效
    - chapter: ch003
      beat: 燼以人形現身說明契約
      outcome: 林遠得知自己被救活，但代價已無法撤回
    - chapter: ch004
      beat: 主角開始規劃社會面偽裝
      outcome: 決定先硬撐原本生活
    - chapter: ch005
      beat: 回公司上班並差點被熟人看穿
      outcome: 阿強開始注意到異狀
    - chapter: ch006
      beat: 林遠評估各種退路全數失敗
      outcome: 決定冒險向阿強求助
    - chapter: ch007
      beat: 林遠向阿強坦白真相
      outcome: 取得外派掩護方案與第一個人類盟友
    - chapter: ch008
      beat: 夜間外出散心卻誤入狩獵結界
      outcome: 首次正面遭遇妖魔
    - chapter: ch009
      beat: 狼妖襲擊與銀色靈光爆發
      outcome: 林遠的除魔師資質被實戰驗證
    - chapter: ch010
      beat: 戰後回家重新審視新肉體
      outcome: 身體敏感度與女性化現實感同步加深
    - chapter: ch011
      beat: 燼說明妖魔與除魔師規則
      outcome: 林遠理解自己已被拖入超自然秩序
    - chapter: ch012
      beat: 靈力後遺症引爆飢渴
      outcome: 契約對身體的支配性需求正式浮現
    - chapter: ch013
      beat: 燼解釋陰陽調和的必要性
      outcome: 林遠知道生存已與燼綁定
    - chapter: ch014
      beat: 初次前戲與失控快感
      outcome: 林遠身體對燼的反應被徹底打開
    - chapter: ch015
      beat: 首次完整陰陽調和
      outcome: 契約依賴更深，身體與心理界線都被推進
    - chapter: ch016
      beat: 次日醒來，身體持續變化並決定採買
      outcome: 進入「日常女性化生活」的必要階段
    - chapter: ch017
      beat: 百貨公司購物與回家晚餐
      outcome: 林遠首次較完整地以新外表融入消費與生活場景
    - chapter: ch018
      beat: 收到淵聲研究所的外派資料
      outcome: 新工作與新主線入口確立
    - chapter: ch019
      beat: 正式到淵聲研究所報到
      outcome: 舊城區、研究所與新角色群成為下一階段核心舞台
  character_state_snapshot:
    lin-yuan: >
      正處於「努力維持社會功能」與「被超自然力量持續重塑」的夾縫中，
      外在更像成熟亮眼的年輕女性，內在仍在抗拒與適應之間震盪。
    jin: >
      表面像玩世不恭的危險同居人，實際上牢牢掌握林遠的生死、
      契約維生與超自然資訊入口。
    a-qiang: >
      已升級為現實層面的掩護者與知情者，
      其情感位置可能不再只是普通兄弟。
    yuansheng_side: >
      蘇臨提供友善入口，所長則帶來明顯警戒感；
      研究所本身目前仍充滿未知。
  near_term_next_steps:
    - 林遠開始接觸淵聲研究所的紙本檔案與舊案資料
    - 研究所內部人際與權力感逐步展開
    - 舊城區的不對勁來源有機會被具體化
    - 林遠可能接觸更多和妖魔、結界、異常事件相關的正式資訊
  continuity_flags:
    - >
      章節日期需對齊：
      ch018 為 2025/10/19（星期日），
      ch019 為 2025/10/20（星期一），
      往前回推 ch001 為 2025/10/16（星期四）雨夜。
    - >
      研究所所長截至 ch019 尚未在正文中公開姓名，
      不應提前把秘密檔中的姓名直接寫回正文或公開 canon。

speculative_long_arc:
  editable: true
  status: author_adjustable_projection
  note: 以下為依據現有 canon 可合理推估的中短期方向，不視為已定 canon。
  central_questions:
    - 林遠能否在保住人類社會身分的同時，學會使用除魔師力量？
    - 燼究竟想把林遠培養成夥伴、容器、食糧，還是更複雜的存在？
    - 淵聲研究所會成為庇護所、情報站，還是另一種危險巢穴？
  projected_arc:
    - phase: 研究所適應期
      function: 讓林遠接觸紙本檔案、怪異紀錄與新同事，逐步建立新的工作日常。
      likely_material:
        - 舊城區與研究所的異常感來源
        - 所長與蘇臨對林遠的觀察
        - 林遠用技術能力整理超自然資料
    - phase: 能力學習期
      function: 把林遠從被動挨打推向有限度的主動使用靈力。
      likely_material:
        - 控制銀色靈光
        - 再次遭遇妖魔或結界
        - 契約飢渴與戰鬥代價同步上升
    - phase: 關係加壓期
      function: 同步推高林遠與燼、阿強、研究所之間的情感與立場衝突。
      likely_material:
        - 對燼的依賴與反抗
        - 阿強的介入程度升高
        - 林遠在不同陣營之間的信任選擇
