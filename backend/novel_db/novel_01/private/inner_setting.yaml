meta:
  title: 裏性格專區
  scope: R-18 related character notes
  source_of_truth: ../bible/characters.yaml
  isolation_policy:
    - This file is private-only and must not be imported into bible, outline, context, or chapters automatically.
    - Data flow is one-way: ../bible/characters.yaml -> private/inner_setting.yaml.
    - Do not copy notes from this file back into public canon unless the user explicitly requests it.
    - Keep explicit R-18 details here only; public character files should reference neither this file nor its contents.
  visibility: private
  auto_context: false
  backend_export: excluded
  protected_from:
    - opera_export
    - auto_workspace_context
    - bible_update
    - consistency_check
    - chapter_generation

characters:
  - character_id: lin-yuan
    source: ../bible/characters.yaml#lin-yuan
    inner_profile: "原為男性上班族，因契約被重塑為極度敏感的女性肉體。潛意識裡對自己女性化的身體既抗拒又無法控制地產生快感，特別是在被燼觸碰時，理性與本能的衝突會帶來強烈的羞恥感。"
    r18_boundaries:
      - "可接受高強度的強制愛或半強迫情節"
      - "可接受因為陰性靈力過剩而主動求歡的失控狀態"
      - "可接受身體改造或異物感描寫"
    intimacy_triggers:
