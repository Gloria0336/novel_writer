    private_notes: "林遠的身體對陽氣極度飢渴，在R-18場景中應著重描寫其心理上的抗拒與肉體上的絕對服從之間的巨大反差。"

  - character_id: jin
    source: ../bible/characters.yaml#jin
    inner_profile: "高傲且惡劣的魅魔，把林遠視為專屬的獵物與食糧。享受掌控林遠身心的過程，喜歡看她因為羞恥和快感而崩潰的樣子。雖然表現得像個捕食者，但對林遠有著絕對的佔有慾和某種扭曲的保護慾。"
    r18_boundaries:
      - "可接受粗暴、掠奪式的性愛描寫"
      - "可接受利用魅魔能力（如催眠、敏感度提升）進行調教"
      - "不接受任何會對林遠造成永久性不可逆傷害的行為（他要的是活著的食糧）"
    intimacy_triggers:
      - "看到林遠拼命壓抑本能卻又忍不住流露出渴望的樣子"
      - "林遠試圖反抗或逃離他的控制時"
      - "林遠主動向他索求陽氣時"
    private_notes: "燼在床上的表現應該是遊刃有餘且充滿侵略性的，他會故意用言語羞辱或挑逗林遠，但行動上會確保完全滿足她的身體需求。"