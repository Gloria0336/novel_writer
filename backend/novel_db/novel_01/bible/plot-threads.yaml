open_threads:
  - id: accident-origin
    hook: 林遠遭遇的貨車事故究竟只是意外，還是更大超自然鏈條的開端？
    introduced_in: ch001
    status: open
    stakes: 若事故並非單純巧合，林遠可能早已被某方盯上。
    likely_payoff_window: 近中期

  - id: contract-irreversible
    hook: 燼聲稱陰陽契約一旦成立就無法解除，這是否完全屬實？
    introduced_in: ch003
    status: open
    stakes: 決定林遠能否恢復原貌、如何看待未來人生，以及是否可能反制燼。
    likely_payoff_window: 中後期

  - id: public-passing
    hook: 林遠能否靠外派客戶端支援與新員工證方案，持續維持「林遠」這個社會身分而不穿幫？
    introduced_in: ch004
    status: open
    stakes: 一旦失敗，工作、房貸、社交圈與人身安全都可能崩盤。
    likely_payoff_window: 近期持續線

  - id: jin-intentions
    hook: 燼真正為何選擇林遠、又希望從契約中得到什麼？
    introduced_in: ch001
    status: open
    stakes: 這決定他是危險的寄生者、不得已的同盟，還是更複雜的存在。
    likely_payoff_window: 中期

  - id: a-qiang-confidant
    hook: 阿強成為第一個知道真相的普通人盟友後，能否真的穩住局面而不是把風險一併放大？
    introduced_in: ch005
    status: active
    stakes: 這直接改變林遠的孤軍狀態，也把秘密共享、掩護作業與信任壓力推上檯面。
    likely_payoff_window: 近期持續線

  - id: client-site-cover-plan
    hook: 阿強提出的「客戶端資安支援借調＋新員工證」方案，實際執行時會遇到哪些破綻與代價？
    introduced_in: ch007
    status: open
    stakes: 若方案成功，林遠可暫時脫離總部熟人視線；若失敗，將同時引爆公司內部與現實身份危機。
    likely_payoff_window: 近期

  - id: lin-yuan-a-qiang-romantic-tension
    hook: 阿強在知情後仍能自然調侃並逼近林遠，這份朋友義氣是否會逐漸轉向更曖昧的牽引？
    introduced_in: ch007
    status: emerging
    stakes: 這會改變林遠對自我、友情與新身體的感受，也可能讓掩護關係變得更複雜。
    likely_payoff_window: 近中期

  - id: exorcist-sanctuary-entry
    hook: 獵魔殿何時介入，並以何種方式鎖定林遠與燼？
    introduced_in: worldbuild-planning
    status: active
    stakes: 這將把私人求生問題升級為都市超自然追獵。狼妖的出現暗示獵食者已開始頻繁活動。
    likely_payoff_window: 中期

  - id: lin-yuan-power-awakening
    hook: 林遠體內的「除魔師」潛力來源為何？為何契約後才覺醒？
    introduced_in: ch009
    status: active
    stakes: 若能掌握這股力量，林遠可能不再僅僅是燼的附庸，甚至具備反制妖魔的能力。
    likely_payoff_window: 近中期

  - id: contract-hunger-cycle
    hook: 林遠在 ch012~15 首次爆發契約飢餓並完成補給後，未來這種需求會如何週期性發作、能否以別的方式緩解？
    introduced_in: ch012
    status: active
    stakes: 這直接牽動林遠的身體自主、與燼的權力關係，以及她能否在戰鬥需求與日常生活之間找到較低代價的平衡。
    likely_payoff_window: 近期持續線

  - id: body-feminization-progression
    hook: 第一次陰陽調和後，林遠的胸部與身體曲線已出現再次發育跡象；這種女性化進程會持續到什麼程度？
    introduced_in: ch016
    status: emerging
    stakes: 這將直接衝擊林遠的身份偽裝、衣著需求與自我認同，也會讓外界更容易察覺異常。
    likely_payoff_window: 近期

  - id: debt-to-jin
    hook: 燼兩次救命皆強調「欠我一條命」，這份債務最終將以何種形式償還？
    introduced_in: ch001
    status: persistent
    stakes: 每一次救命都加深了兩人的綁定，代價可能涉及靈魂或肉身的徹底淪陷。
    likely_payoff_window: 中後期
