relationships:
  - pair:
      - lin-yuan
      - jin
    dynamic: >
      兩人是不可逆的契約共生關係。燼是林遠的救命者、加害者、力量來源與主要危險來源，
      林遠則是燼在現世立足的錨點與食糧。兩人互相需要，但極度缺乏平等與安全感。
    trust_level: 低
    tension: 極高
    conflict_points:
      - 契約是在林遠瀕死時成立，林遠始終認為自己被半強迫奪走人生
      - 燼習慣以戲弄、威壓與身體主導權控制局面
      - 林遠需要燼的力量與知識，但也懼怕自己對燼產生依賴
      - ch012~15 後兩人的關係加入明確的進食與性支配層面，情緒更複雜
    last_updated_in: ch019

  - pair:
      - lin-yuan
      - a-qiang
    dynamic: >
      原本是熟識同事與損友關係。ch007 後阿強成為林遠第一個人類知情者與現實層面的求生盟友，
      能在公司流程、人情與掩護方案上幫忙處理危機。
    trust_level: 高
    tension: 中高
    conflict_points:
      - 林遠仍擔心自己的秘密會連累阿強
      - 阿強的玩笑式曖昧讓林遠強烈不自在
      - 兩人的關係正在從兄弟情誼滑向更難定義的曖昧區域
    last_updated_in: ch018

  - pair:
      - lin-yuan
      - su-lin
    dynamic: >
      新上司與新人的初始接觸。蘇臨對林遠抱持高度好奇與友善熱情，
      林遠則在陌生環境中本能保持禮貌與戒備。
    trust_level: 低到中
    tension: 低
    conflict_points:
      - 蘇臨對林遠外貌與性別落差感到意外
      - 林遠尚未判斷淵聲研究所是否安全
    last_updated_in: ch019

  - pair:
      - lin-yuan
      - yuansheng-director
    dynamic: >
      兩人剛建立職場接觸。所長對林遠的視線帶有明顯冒犯感與評估意味，
      讓林遠一見面就產生不適與警戒。
    trust_level: 極低
    tension: 中高
    conflict_points:
      - 所長的言行與目光帶有侵略性
      - 林遠無法判斷對方是單純油滑，還是已察覺自己身上的異常
    last_updated_in: ch019
