locations:
  - id: aldir-city
    name: 阿爾迪爾
    type: 現代都市
    region: 故事主要舞台
    first_appearance: ch001
    summary: >
      表面上是普通都市，但暗處存在妖魔、結界與除魔師等超自然現象。
      城市不同區塊的氛圍與危險程度差距極大。
    atmosphere:
      - 表層日常
      - 暗處壓抑
      - 夜間危險感強
    narrative_functions:
      - 讓普通社會與超自然威脅重疊
      - 提供林遠日常身分與異變後求生的雙重場域

  - id: homebound-crossroad
    name: 返家十字路口
    type: 街道路口
    region: 阿爾迪爾市區
    first_appearance: ch001
    summary: >
      林遠在雨夜險些被失控貨車撞死，並於此與燼締結契約。
    atmosphere:
      - 雨夜
      - 命運轉折
      - 死亡迫近
    narrative_functions:
      - 故事主事件起點
      - 契約成立現場

  - id: contract-dreamspace
    name: 契約夢境
    type: 靈魂／意識空間
    region: 非現實場域
    first_appearance: ch001
    summary: >
      林遠在瀕死與昏迷間經歷的灰霧空間，契約與肉體重塑在此完成。
    atmosphere:
      - 灰霧
      - 非人
      - 失真
    narrative_functions:
      - 呈現陰陽契約的成立
      - 象徵舊人生的斷裂

  - id: lin-yuan-apartment
    name: 林遠住處
    type: 住家公寓
    region: 阿爾迪爾市區
    first_appearance: ch002
    summary: >
      林遠醒來後發現變身、與燼同居、發生第一次靈力失控與第一次陰陽調和的核心場景。
    atmosphere:
      - 私密
      - 壓迫
      - 安全感與危險感並存
    narrative_functions:
      - 角色心理崩潰與重整的主舞台
      - 林遠與燼關係快速升溫又失衡的密閉空間

  - id: ad-agency-office
    name: ADC 廣告公司
    type: 職場
    region: 阿爾迪爾商業區
    first_appearance: ch005
    summary: >
      林遠原本工作的公司，也是他最早嘗試用偽裝維持舊身分的場所。
    atmosphere:
      - 社畜日常
      - 熟人壓力
      - 身分暴露風險
    narrative_functions:
      - 連結主角過往人生
      - 促成阿強介入與外派掩護方案

  - id: hunting-barrier-street
    name: 狩獵結界街區
    type: 被妖魔結界覆蓋的街道
    region: 林遠住處附近
    first_appearance: ch008
    summary: >
      狼妖以狩獵結界隔絕一般人感知，在此伏擊林遠；
      林遠也在此首次明確展現除魔師靈光。
    atmosphere:
      - 人跡消失
      - 結界扭曲
      - 捕食壓力
    narrative_functions:
      - 首次戰鬥
      - 顯示普通都市中超自然危險的真實存在

  - id: city-shopping-district
    name: 市中心百貨商圈
    type: 商業購物區
    region: 阿爾迪爾市中心
    first_appearance: ch017
    summary: >
      林遠被迫正式接觸女性服飾、內衣與外表管理，完成一次身分適應的社會化洗禮。
    atmosphere:
      - 明亮
      - 消費誘惑
      - 自我認知混亂
    narrative_functions:
      - 讓林遠第一次在外部世界正面面對「女性化生活」
      - 進一步加深燼與林遠的同居日常

  - id: old-city-district
    name: 舊城區
    type: 老舊城區
    region: 阿爾迪爾邊緣地帶
    first_appearance: ch019
    summary: >
      淵聲研究所所在區域。街道破敗、行人稀少，整體帶有被時代遺忘與不友善的陰冷感。
    atmosphere:
      - 荒涼
      - 被遺忘
      - 潛藏惡意
    narrative_functions:
      - 與市中心日常形成鮮明對比
      - 預示研究所與此地藏有更多不對勁之處

  - id: abyss-echo-research-institute
    name: 淵聲研究所
    type: 民間研究機構
    region: 阿爾迪爾舊城區
    first_appearance: ch018
    summary: >
      對外是掛在民俗文化保存協會相關體系下、研究超自然事件並尋求資料整合的單位。
      實體空間老舊低調，仍大量依賴紙本檔案與人工整理資料。
    atmosphere:
      - 低調
      - 老派
      - 神祕
      - 像考古隊多過科技單位
    narrative_functions:
      - 成為林遠的新工作場域與新主線入口
      - 提供接觸超自然情報與新角色群的節點
    continuity_notes:
      - ch018 先從公開資料與外派通知登場
      - ch019 才首次讓林遠實際進入內部空間與接觸蘇臨、所長
