      - 享受主導局面
      - 偶爾會用照顧之名行操控之實
      - 對林遠展現出明顯佔有欲
    speech_style:
      baseline: 慢條斯理、嘲諷感重
      provocation: 會故意用親暱或調戲語氣刺激對方
      serious_mode: 句子變短，壓迫感明顯提升
    abilities:
      - 以契約形式救活瀕死目標並重塑肉體
      - 化形成人並在現世穩定活動
      - 對妖魔與結界有壓倒性應對能力
      - 可施加隱匿、安眠與感知干涉類效果
      - 能吞食或調和林遠體內過剩的陰性靈力
      - 可施展暗紅色治癒術緩解林遠肉體疼痛與損傷
      - 能讓林遠看見淵念外洩狀態並指導收束
    current_status: >
      目前寄居在林遠家中，將林遠視為自己的契約者與食糧來源。
      對林遠的成長、失控、社交接觸與安全都表現出高度干涉。
      已知他會自行外出行動，並於 ch020 宣稱自己已找到工作。
      ch025 起開始正式教林遠隱匿以降低妖魔與獵魔殿追蹤風險；ch026 以淵聲研究所顧問身份
      在都市親子公園外勤現場登場，正式打破林遠住處與工作場域的邊界。
      ch027~28 顯示他已開始用顧問收入支付房租、購買晚餐並與所長保持直接情報往來；
      對林遠單獨前往「老人家」通報案件一事表現出沒有明說的警覺。
    progressions:
      - at_chapter: ch003
        status: 首次以人形正式現身，說明契約不可逆
      - at_chapter: ch009
        status: 在林遠陷入死局時出手斬首狼妖
      - at_chapter: ch011
        status: 明確說明妖魔與除魔師的基礎規則
      - at_chapter: ch015
        status: 首次完整進行陰陽調和，確認可藉此進食並穩定林遠身體
      - at_chapter: ch018
        status: 顯示自己在外另有活動與情報接觸
      - at_chapter: ch020
        status: 宣稱自己找到工作，暗示會以另一種方式與林遠再見
      - at_chapter: ch023
        status: 向林遠說明獵魔殿的清場、洗腦與淨化風險
      - at_chapter: ch025
        status: 展現治癒術並開始教林遠收束外洩淵念
      - at_chapter: ch026
        status: 以淵聲研究所顧問身份陪同湖區外勤，判讀水性妖魔殘留與現場被善後的痕跡
      - at_chapter: ch028
        status: 已能透過所長得知林遠外勤安排，並在林遠拒絕陪同後對東蘇雜貨案件保留警覺
    goals:
      - 維持自身在現世的立足點
      - 持續進食並利用契約獲取力量與樂趣
      - 讓林遠活下去且變得更能使用力量
      - 防止林遠脫離自己的控制範圍
    known_secrets:
