characters:
  - id: lin-yuan
    name: 林遠
    aliases:
      - 阿遠
    role: 主角；與魅魔燼締結陰陽契約後存活的契約者
    age: 25
    occupation: >
      原為 ADC 廣告公司資安與資料備份人員；
      ch019 起以外派技術人員身分進入淵聲研究所。
    appearance_public: >
      原本是普通上班族男性；契約成立後肉體被重塑成外表極亮眼的年輕女性。
      身形纖細、黑髮柔順、肌膚白皙，五官精緻到幾乎帶有非現實感。
    appearance_current: >
      截至 ch019，林遠已習慣以女性外表出門，會穿剪裁正式的女裝套裝應對工作場合。
      身體持續朝更明顯的女性化方向變化，胸口敏感度與曲線都有持續上升跡象。
    personality:
      - 理性吐槽型
      - 韌性強
      - 遇事先慌後撐
      - 對失控處境極度抗拒
      - 本質善良，不願輕易傷人
      - 對自己的新身分仍有強烈羞恥與排斥
    speech_style:
      baseline: 嘴硬、碎念多，緊張時容易高速吐槽
      under_stress: 聲線會變尖，句子變碎，容易直接爆粗口或求救
      toward_jin: 防備、惱怒、常帶反諷
    abilities:
      - 與燼共享的陰陽契約
      - 被強行喚醒的除魔師資質
      - 戰鬥時會無意識釋放銀色靈光
      - 對低階妖魔具備直接傷害與防護效果
      - 靈力活化後成為妖魔眼中的高價值獵物
    current_status: >
      已確認無法解除契約與恢復原本男性肉體，只能一邊隱瞞過去身分、一邊學習適應新生活。
      透過阿強安排，暫時離開原公司熟人圈，於 ch019 正式到淵聲研究所報到。
      對研究所、舊城區與自身契約機制都抱有高度警戒。
    progressions:
      - at_chapter: ch002
        status: 醒來後確認肉體已被重塑成女性
      - at_chapter: ch009
        status: 在狩獵結界中首次實戰，踢飛狼妖並顯現銀色靈光護體
      - at_chapter: ch011
        status: 從燼口中得知自己具有除魔師天賦
      - at_chapter: ch015
        status: 首次以契約方式完成陰陽調和，身體對靈力與陽氣反應加深
      - at_chapter: ch019
        status: 以女性外表正式展開淵聲研究所的外派新工作
    goals:
      - 活下去並維持基本社會身分
      - 弄清契約、妖魔與除魔師體系的真相
      - 找到能控制靈力與飢渴週期的方法
      - 避免更多人因自己的變化被捲入危險
    known_secrets:
      - 自身原本是男性，現已被契約重塑
      - 燼是寄居於家中的魅魔與契約對象
      - 自己已成為會吸引妖魔的特殊目標
    first_appearance: ch001

  - id: jin
    name: 燼
    aliases: []
    role: 魅魔；林遠的契約對象與同居者
    age: 未知
    occupation: 無固定人類職業
    appearance_public: >
      銀髮、金瞳、外貌極具侵略性魅力的高大男性，
      常穿黑色長版風衣，氣質慵懶卻危險。
    appearance_current: >
      平時維持穩定人形，能自由出入林遠住處與都市空間。
      在戰鬥與威壓狀態下，眼神與氣息會明顯偏向捕食者。
    personality:
      - 惡劣
      - 高傲
      - 觀察欲強
      - 享受主導局面
      - 偶爾會用照顧之名行操控之實
      - 對林遠展現出明顯佔有欲
    speech_style:
      baseline: 慢條斯理、嘲諷感重
      provocation: 會故意用親暱或調戲語氣刺激對方
      serious_mode: 句子變短，壓迫感明顯提升
    abilities:
      - 以契約形式救活瀕死目標並重塑肉體
      - 化形成人並在現世穩定活動
      - 對妖魔與結界有壓倒性應對能力
      - 可施加隱匿、安眠與感知干涉類效果
      - 能吞食或調和林遠體內過剩的陰性靈力
    current_status: >
      目前寄居在林遠家中，將林遠視為自己的契約者與食糧來源。
      對林遠的成長、失控、社交接觸與安全都表現出高度干涉。
      已知他會自行外出行動，但未明說真正目的。
    progressions:
      - at_chapter: ch003
        status: 首次以人形正式現身，說明契約不可逆
      - at_chapter: ch009
        status: 在林遠陷入死局時出手斬首狼妖
      - at_chapter: ch011
        status: 明確說明妖魔與除魔師的基礎規則
      - at_chapter: ch015
        status: 首次完整進行陰陽調和，確認可藉此進食並穩定林遠身體
      - at_chapter: ch018
        status: 顯示自己在外另有活動與情報接觸
    goals:
      - 維持自身在現世的立足點
      - 持續進食並利用契約獲取力量與樂趣
      - 讓林遠活下去且變得更能使用力量
      - 防止林遠脫離自己的控制範圍
    known_secrets:
      - 是林遠事故當夜的救命者也是加害性重塑者
      - 明知契約代價仍主導契約成立
      - 對林遠抱有超出單純同居或餵食的興趣
    first_appearance: ch001

  - id: a-qiang
    name: 阿強
    aliases: []
    role: 林遠原公司同事；目前最早得知真相的人類協力者
    age: 未知
    occupation: ADC 廣告公司業務部員工
    appearance_public: >
      都市上班族男性，作風直接，帶點不修邊幅與市井感。
    appearance_current: >
      ch007 後成為林遠對外求生計畫的關鍵支援者，
      已主動協助安排外派專案與替代識別資料。
    personality:
      - 義氣
      - 神經大條但觀察不差
      - 愛嘴砲
      - 關鍵時刻願意扛事
      - 對靈異怪談有興趣
    speech_style:
      baseline: 口語直接、偏痞
      toward_lin_yuan: 熟人式吐槽，偶爾故意逗弄
      serious_mode: 會迅速切回務實解法
    abilities:
      - 善於補位與臨場想方案
      - 能處理公司內部人情與流程操作
      - 在林遠情緒崩潰時仍能保持基本信任
    current_status: >
      已接受林遠遭遇超自然變化的事實，並替他安排淵聲研究所外派案當掩護。
      對林遠現在的女性外表產生了明顯的曖昧與逗弄反應。
    progressions:
      - at_chapter: ch005
        status: 察覺林遠外觀與狀態異常
      - at_chapter: ch007
        status: 成為第一個被林遠親口告知真相的人
      - at_chapter: ch007
        status: 提出客戶端常駐掩護方案並承諾協助偽造員工證
      - at_chapter: ch018
        status: 完成淵聲研究所的外派安排
    goals:
      - 幫林遠撐過身分危機
      - 盡量把事情壓在公司與一般人可理解範圍內
    known_secrets:
      - 知道林遠原本是男性
      - 知道林遠的變化不屬於科學可解釋範圍
    first_appearance: ch005

  - id: su-lin
    name: 蘇臨
    aliases: []
    role: 淵聲研究所資料組組長兼行政；兼任所長秘書
    age: 三十出頭
    occupation: 淵聲研究所職員
    appearance_public: >
      打扮亮麗、行動俐落的女性，對新同事會表現出過度熱情的關注。
    appearance_current: >
      ch019 首度登場，負責接待林遠、介紹研究所環境與工作桌位。
      穿著幹練連身裙，言行熱絡，對林遠的外貌與性別落差反應非常直接。
    personality:
      - 熱情
      - 愛打趣
      - 社交表達直接
      - 觀察細
    speech_style:
      baseline: 輕快、熟門熟路、帶點八卦感
      workplace_mode: 會把尷尬場面用玩笑帶過
    abilities:
      - 對研究所日常運作與行政流程非常熟
      - 具備安撫新人的社交能力
    current_status: >
      已知道外派來的人是名叫林遠的技術支援，但對其性別與外貌明顯感到意外。
      目前是林遠在研究所內第一個較友善的對接窗口，並已公開說明林遠前幾天的工作
      會先以紙本檔案整理與環境熟悉為主。
    first_appearance: ch019

  - id: yuansheng-director
    name: 淵聲研究所所長
    aliases: []
    role: 研究所負責人
    age: 中年
    occupation: 淵聲研究所所長
    appearance_public: >
      捲髮、鬍渣、氣質頹廢的中年男性，辦公室裡把玩古青銅零件般的物件。
    appearance_current: >
      ch019 以所長身分與林遠首次見面，對林遠表現出強烈且令人不適的男性凝視。
    personality:
      - 油滑
      - 疲憊感重
      - 觀察人時帶侵略性
    speech_style:
