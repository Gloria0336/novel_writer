characters:
  - id: lin-yuan
    name: 林遠
    aliases:
      - 阿遠
    role: 主角／陰陽契約者
    age: 25
    occupation: 廣告公司資訊安全與資訊庫房管理相關職務
    appearance_public: >
      原本是外表普通、長期加班、帶著八百度近視黑框眼鏡的年輕上班族，
      平時形象低調、不起眼，在公司存在感不高。
    appearance_current: >
      契約後被改造成女性化肉身，身形更嬌小纖細，五官被精細重塑，
      膚質透亮，頭髮略長且柔順，近視被修正；經 ch012~16 的首次陰陽調和後，
      胸部與整體曲線再度微幅發育，身體維持高度敏感與痠軟狀態，
      目前仍靠口罩、寬大外套、墊肩與增高鞋墊勉強維持男性外觀偽裝。
    personality:
      - 克制
      - 觀察型
      - 容易內耗
      - 面對荒謬現實時會自嘲
      - 在高壓與羞恥中容易短暫失控
      - 仍保有基本良知與日常倫理感
    speech_style:
      baseline: 偏壓低音量、保守措辭、帶一點疲憊感
      under_stress: 驚嚇時會尖叫、斷句、重複否定，崩潰時語速變快
      humor: 常帶社畜式自嘲與倒楣感
    abilities:
      - 與魅魔燼簽訂陰陽契約後存活
      - 具備看見妖魔與異常存在的潛能
      - 可作為燼停留現世的錨點
      - 可感知並承受高濃度淵念；目前體內主要以失衡陰性靈力的形式表現
      - 除魔師（Exorcist）潛力：受威脅時能本能激發銀白微光（護罩），具備超越常人的體能爆發力
      - 靈力自覺：小腹深處已能感覺到熱流，並可主動召喚微量銀色靈力
      - 契約補給機制：可透過與燼進行陰陽調和，中和體內失衡陰力並暫時穩定肉身
    current_status: >
      契約生效後進入女性化肉身，對自身狀態極度抗拒；已勉強完成一次職場偽裝，
      並在 ch007 向阿強坦白真相。ch009 首次遭遇狼妖並在燼的指引下反擊，
      激發除魔師護罩；ch012~15 首次完整爆發契約飢餓，並在被迫情況下與燼完成陰陽調和，
      從靈力失衡邊緣被拉回穩定，但留下明顯的羞恥記憶、下半身痠痛與再次女性化跡象。
      ch016 早晨仍步態不穩，已開始意識到貼身衣物與外出偽裝都需要全面重整。
    goals:
      - 在不失去工作與生活的前提下維持日常
      - 搞清楚契約與變身是否真的不可逆
      - 避免被外界發現異常
      - 不被燼完全掌控
    secrets:
      - 差點死於車禍並與魅魔簽約
      - 原本為男性，現在被重塑為女性化肉身
      - 已能接觸妖魔與契約相關靈異事件
    first_appearance: ch001

  - id: jin
    name: 燼
    aliases:
      - 魅魔
      - 契約妖魔
    role: 魅魔搭檔／契約另一端
    age: 未知
    occupation: 無固定人類職業
    appearance_public: >
      化形為高挑俊美的成年男性，銀髮金眼，常穿黑色長版風衣，
      氣質冷冽、顯眼，但仍能以過於出眾的人類外表在都市中自然活動。
    appearance_current: >
      目前以人類男性姿態活動，居住於林遠家中，外表穩定；
      能以契約與靈力維繫現世存在。
    personality:
      - 外冷內熱
      - 嘴硬
      - 刻薄戲謔
      - 掌控欲強
      - 關鍵時刻會救場
      - 對人類倫理感淡薄
    speech_style:
      baseline: 慵懶、低沉、像在看戲
      provocation: 愛用嘲諷、挑眉式反問、故意踩林遠痛點
      care: 關心時仍帶嫌棄口吻，不直接說軟話
    abilities:
      - 在瀕死瞬間凍結體感時間並與人類簽約
      - 透過陰陽契約化為穩定人形
      - 可強制安撫或催眠契約者
      - 隱匿咒（Concealment Spell）：可使契約者在常人眼中消失（隱身）
      - 瞬殺術：紅光閃過即可斬首初階妖魔，攻擊手段帶著毀滅性的「淨化」或「焚燒」特徵
      - 可透過肢體接觸與交合吞食契約者過剩陰氣，並回灌陽氣中和失衡
    current_status: >
      已入住林遠家中，自稱化形後身無分文；對妖魔、契約與獵魔相關規則顯然知道得更多。
      ch012~15 以「陰陽調和」名義完成第一次正式補給，進一步確認林遠的失衡陰氣
      既是他的食糧，也是維持契約穩定的手段；對契約者肉身與節奏的支配欲因此更加明確。
      依目前 canon 整理，他與林遠的初次接觸高度疑似不是單純巧合，而是主動鎖定特殊資質後推動完成。
    first_appearance: ch001

  - id: a-qiang
    name: 阿強
    aliases: []
    role: 林遠在公司少數的朋友
    age: 未知
    occupation: 廣告公司業務部員工
    appearance_public: >
      陽光帥氣、體格結實，帶著一種大男孩式的爽朗存在感，
      在公司裡屬於很容易被注意到、也很容易跟人混熟的類型，
      與低調的林遠形成鮮明對比。
    appearance_current: >
      目前主要以聲音、行動與待人方式建立印象；整體給人開朗、
      好親近又有點粗線條的感覺，第一眼像是不拘小節的陽光系帥哥。
    personality:
      - 神經大條
      - 個性直率大剌剌
      - 其實相當聰明
      - 重義氣
      - 嘴碎
      - 太直率又太木頭，感情上母胎單身
      - 對靈異怪談有興趣
      - 粗枝大葉但會照顧朋友
    speech_style:
      baseline: 直接、生活化、帶點吐槽感
      toward_lin_yuan: 熟人式嘴硬關心，常先虧再遞台階
      emotional_core: 不擅長細膩安慰，但會用實際行動表示關心
    abilities:
      - 暫無超自然能力描寫
    current_status: >
      已從懷疑林遠狀態異常，推進到成為第一位正式知情者；
      震驚之餘仍選擇協助，並主動提出利用公司外派專案與偽造新員工證掩護林遠。
    goals:
      - 幫林遠暫時保住工作、日常身分與生活節奏
      - 以自己能做到的現實手段協助善後
    secrets:
      - 知道林遠已被重塑為女性化肉身，成為目前唯一的人類知情者
    first_appearance: ch005
