      serious_mode: 會迅速切回務實解法
    abilities:
      - 善於補位與臨場想方案
      - 能處理公司內部人情與流程操作
      - 在林遠情緒崩潰時仍能保持基本信任
    current_status: >
      已接受林遠遭遇超自然變化的事實，並替他安排淵聲研究所外派案當掩護。
      對林遠現在的女性外表產生了明顯的曖昧與逗弄反應。
    progressions:
      - at_chapter: ch005
        status: 察覺林遠外觀與狀態異常
      - at_chapter: ch007
        status: 成為第一個被林遠親口告知真相的人
      - at_chapter: ch007
        status: 提出客戶端常駐掩護方案並承諾協助偽造員工證
      - at_chapter: ch018
        status: 完成淵聲研究所的外派安排
    goals:
      - 幫林遠撐過身分危機
      - 盡量把事情壓在公司與一般人可理解範圍內
    known_secrets:
      - 知道林遠原本是男性
      - 知道林遠的變化不屬於科學可解釋範圍
    first_appearance: ch005

  - id: su-lin
    name: 蘇臨
    aliases: []
    role: 淵聲研究所資料組組長兼行政；兼任所長秘書
    age: 三十出頭
    occupation: 淵聲研究所職員
    appearance_public: >
      打扮亮麗、行動俐落的女性，對新同事會表現出過度熱情的關注。
    appearance_current: >
      ch019 首度登場，負責接待林遠、介紹研究所環境與工作桌位。
      穿著幹練連身裙，言行熱絡，對林遠的外貌與性別落差反應非常直接。
      ch020 帶林遠進入紙本資料地獄，並指出阿爾迪爾近兩年的異常「聲源」
      越來越集中，像有什麼東西正在醒來。
    personality:
      - 熱情
      - 愛打趣
      - 社交表達直接
      - 觀察細
    speech_style:
      baseline: 輕快、熟門熟路、帶點八卦感
      workplace_mode: 會把尷尬場面用玩笑帶過
    abilities:
      - 對研究所日常運作與行政流程非常熟
      - 具備安撫新人的社交能力
      - 能從資料座標與異常聲源分布中看出趨勢
    current_status: >
      已知道外派來的人是名叫林遠的技術支援，但對其性別與外貌明顯感到意外。
      目前是林遠在研究所內第一個較友善的對接窗口，並已公開說明林遠前幾天的工作
      會先以紙本檔案整理與環境熟悉為主。她對阿爾迪爾異常聲源集中現象抱有明顯關注。
    first_appearance: ch019

