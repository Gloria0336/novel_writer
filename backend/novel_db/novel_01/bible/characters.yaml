characters:
  - id: lin-yuan
    name: 林遠
    aliases:
      - 阿遠
    role: 主角；與魅魔燼締結陰陽契約後存活的契約者
    age: 25
    occupation: >
      原為 ADC 廣告公司資安與資料備份人員；
      ch019 起以外派技術人員身分進入淵聲研究所，負責紙本異常檔案整理與數位化。
    appearance_public: >
      原本是普通上班族男性；契約成立後肉體被重塑成外表極亮眼的年輕女性。
      身形纖細、黑髮柔順、肌膚白皙，五官精緻到幾乎帶有非現實感。
    appearance_current: >
      截至 ch026，林遠已能以女性外表去淵聲研究所工作，會穿套裝、及膝裙、
      針織上衣與連身裙等職場女裝。第二次陰陽調和後，胸口曲線已明顯發育，
      臉部與身形也比初期更成熟，內衣尺寸需要再次更換；上週襯衫已在胸前明顯緊繃。
    personality:
      - 理性吐槽型
      - 韌性強
      - 遇事先慌後撐
      - 對失控處境極度抗拒
      - 本質善良，不願輕易傷人
      - 對自己的新身分仍有強烈羞恥與排斥
    speech_style:
      baseline: 嘴硬、碎念多，緊張時容易高速吐槽
      under_stress: 聲線會變尖，句子變碎，容易直接爆粗口或求救
      toward_jin: 防備、惱怒、常帶反諷
    abilities:
      - 與燼共享的陰陽契約
      - 被強行喚醒的除魔師資質
      - 戰鬥時會無意識釋放銀色靈光
      - 對低階妖魔具備直接傷害與防護效果
      - 靈力活化後成為妖魔眼中的高價值獵物
      - 可在危急時將銀色淵念短暫附著於掃帚等物件上形成斬擊
      - ch025 起開始學習收束外洩淵念的隱匿基礎
    current_status: >
      已確認無法解除契約與恢復原本男性肉體，只能一邊隱瞞過去身分、一邊學習適應新生活。
      透過阿強安排，暫時離開原公司熟人圈，於 ch019 正式到淵聲研究所報到。
      ch020 起接觸帶有「念」的異常紙本檔案；ch022 在便利商店事件中殺死水棲低階妖魔；
      ch023 得知獵魔殿與淨化風險；ch025 開始向燼學習隱匿；ch026 被蘇臨帶往湖區外勤，
      並目睹燼以淵聲研究所顧問身份正式出現在工作場域。ch028 時，林遠的隱匿已有些微進步，
      並因研究所現場人力短缺被納入外勤支援；他利用資料數位化成果建立異常事件地圖，
      發現近三年事件強度與頻率升高、分布正由港區與舊城區往市區內部延伸。
      ch028 末，林遠單獨前往天蘇區東蘇雜貨訪談時遭通報人以異香與茶飲陷阱削弱行動力，
      陷入即將被捕食的危機。
    progressions:
      - at_chapter: ch002
        status: 醒來後確認肉體已被重塑成女性
      - at_chapter: ch009
        status: 在狩獵結界中首次實戰，踢飛狼妖並顯現銀色靈光護體
      - at_chapter: ch011
        status: 從燼口中得知自己具有除魔師天賦
      - at_chapter: ch015
        status: 首次以契約方式完成陰陽調和，身體對靈力與陽氣反應加深
      - at_chapter: ch019
        status: 以女性外表正式展開淵聲研究所的外派新工作
      - at_chapter: ch020
        status: 開始整理研究所異常聲波與「念」相關紙本檔案，接觸阿爾迪爾異常聲源集中線索
      - at_chapter: ch022
        status: 在便利商店內以銀色淵念覆蓋掃帚斬殺三隻水棲低階妖魔
      - at_chapter: ch023
        status: 得知獵魔殿存在，以及契約者可能被視為墮落者淨化
      - at_chapter: ch025
        status: 第二次調和後身體再度成長，並初步學會收束外洩淵念
      - at_chapter: ch026
        status: 首次把隱匿帶入研究所日常與外勤調查，在壓力下仍會破功但能勉強收束；得知燼已成為研究所顧問
      - at_chapter: ch028
        status: 被研究所納入外勤支援，建立阿爾迪爾異常事件擴散地圖；單獨訪談東蘇雜貨通報人時被異香削弱，淵念調動受阻
    goals:
      - 活下去並維持基本社會身分
      - 弄清契約、妖魔與除魔師體系的真相
      - 找到能控制靈力與飢渴週期的方法
      - 避免更多人因自己的變化被捲入危險
    known_secrets:
      - 自身原本是男性，現已被契約重塑
      - 燼是寄居於家中的魅魔與契約對象
      - 自己已成為會吸引妖魔的特殊目標
    first_appearance: ch001

  - id: jin
    name: 燼
    aliases: []
    role: 魅魔；林遠的契約對象與同居者
    age: 未知
