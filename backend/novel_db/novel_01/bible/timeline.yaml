timeline:
  - day: 2025/10/16 (Thursday)
    time_of_day: 雨夜，下班後
    chapter: ch001
    location_id: homebound-crossroad
    event: 林遠在返家途中遭遇失控貨車，於瀕死瞬間答應不明存在的救命交易。
    state_change: 陰陽契約成立，人生軌道徹底改寫。

  - day: 2025/10/16 to 2025/10/17
    time_of_day: 昏迷與契約重塑期間
    chapter: ch001
    location_id: contract-dreamspace
    event: 林遠在灰霧般的契約夢境中被重塑肉體與靈魂結構。
    state_change: 原有男性身體被改寫為女性肉體，並與燼建立不可逆連結。

  - day: 2025/10/17 (Friday)
    time_of_day: 凌晨 03:42
    chapter: ch002
    location_id: lin-yuan-apartment
    event: 林遠醒來，第一次確認自己已經變成女性外表。
    state_change: 初步意識到契約帶來的身體變異無法視作夢境。

  - day: 2025/10/17 (Friday)
    time_of_day: 凌晨至清晨
    chapter: ch003
    location_id: lin-yuan-apartment
    event: 燼正式以人形現身，說明契約不可逆，並將林遠安撫入睡。
    state_change: 林遠得知救命者就是現身眼前的魅魔燼。

  - day: 2025/10/17 (Friday)
    time_of_day: 清晨至午前
    chapter: ch004
    location_id: lin-yuan-apartment
    event: 林遠請半天假，開始規劃如何以偽裝維持原本的社會身分。
    state_change: 決定暫時隱瞞真相並硬著頭皮維持正常生活。

  - day: 2025/10/17 (Friday)
    time_of_day: 午後至傍晚
    chapter: ch005
    location_id: ad-agency-office
    event: 林遠第一次以偽裝狀態回公司，阿強察覺異狀並送上薑茶。
    state_change: 原職場身分的可維持性受到明顯挑戰。

  - day: 2025/10/17 (Friday)
    time_of_day: 晚上
    chapter: ch006
    location_id: lin-yuan-apartment
    event: 林遠評估辭職、坦白、就醫等方案後全部否決，決定向阿強求助。
    state_change: 首次主動把危機向可信人類同伴攤開。

  - day: 2025/10/17 (Friday)
    time_of_day: 夜間
    chapter: ch007
    location_id: lin-yuan-apartment
    event: 林遠向阿強坦承自己就是變化後的模樣；阿強提出客戶端常駐與新員工證方案。
    state_change: 阿強成為知情協力者，林遠獲得暫時性的現實掩護計畫。

  - day: 2025/10/17 (Friday)
    time_of_day: 深夜
    chapter: ch008
    location_id: hunting-barrier-street
    event: 林遠外出散心時誤入狩獵結界，遭遇狼妖伏擊。
    state_change: 首次直接被妖魔視為獵物，確認自身已被超自然世界鎖定。

  - day: 2025/10/17 (Friday)
    time_of_day: 深夜稍後
    chapter: ch009
    location_id: hunting-barrier-street
    event: 林遠在求生本能下踢飛狼妖、身上浮現銀色靈光，最終由燼出手斬殺狼妖。
    state_change: 除魔師資質與護體靈光首次實戰顯現。

  - day: 2025/10/17 (Friday)
    time_of_day: 深夜返家後
    chapter: ch010
    location_id: lin-yuan-apartment
    event: 林遠在鏡前重新審視自己的新肉體，發現戰鬥後殘留的高敏感與靈力反應。
    state_change: 對女性化身體的陌生感與排斥感進一步加深。

  - day: 2025/10/17 (Friday)
    time_of_day: 深夜
    chapter: ch011
    location_id: lin-yuan-apartment
    event: 燼說明妖魔源於人類負面情感，並指出林遠擁有被強行喚醒的除魔師天賦。
    state_change: 林遠第一次理解自己不是單純受害者，而是已進入超自然戰局。

  - day: 2025/10/17 (Friday) to 2025/10/18 (Saturday)
    time_of_day: 夜深至黎明前
    chapter: ch012
    location_id: lin-yuan-apartment
    event: 林遠在戰鬥與靈力活化後迎來強烈飢渴與失衡反應。
    state_change: 確認契約會引發週期性的身體需求。

  - day: 2025/10/17 (Friday) to 2025/10/18 (Saturday)
    time_of_day: 同一夜
    chapter: ch013
    location_id: lin-yuan-apartment
    event: 燼正式說明需要以陰陽調和方式中和失衡並進食。
    state_change: 林遠知道契約維生機制與身體需求已和燼綁死。

  - day: 2025/10/17 (Friday) to 2025/10/18 (Saturday)
    time_of_day: 同一夜
    chapter: ch014
    location_id: lin-yuan-apartment
    event: 燼以前戲方式引導林遠第一次進入高度失控的快感狀態。
    state_change: 林遠對陽氣、身體快感與契約反應的連動性被徹底打開。

  - day: 2025/10/17 (Friday) to 2025/10/18 (Saturday)
    time_of_day: 同一夜
    chapter: ch015
    location_id: lin-yuan-apartment
    event: 兩人完成首次完整的陰陽調和。
    state_change: 林遠身體對燼的陽氣與契約供給形成更深層的依賴可能。

  - day: 2025/10/18 (Saturday)
    time_of_day: 早晨
    chapter: ch016
    location_id: lin-yuan-apartment
    event: 林遠醒來後全身痠軟，發現胸口曲線與敏感度又有進一步變化，決定外出採買。
    state_change: 肉體女性化進程持續推進，日常用品與穿著系統必須全面重建。

  - day: 2025/10/18 (Saturday)
    time_of_day: 白天至晚間
    chapter: ch017
    location_id: city-shopping-district
    event: 林遠在百貨公司大量添購女裝與生活用品，回家後與燼共享高價晚餐。
    state_change: 首次在公開空間較完整地以女性外表行動，心理抗拒與適應並行。

  - day: 2025/10/19 (Sunday)
    time_of_day: 上午至夜間
    chapter: ch018
    location_id: lin-yuan-apartment
    event: 林遠收到阿強安排的淵聲研究所外派資料，並確認週一前往報到。
    state_change: 舊身分危機暫時被轉移到新的工作場域與新主線入口。

  - day: 2025/10/20 (Monday)
    time_of_day: 早上 08:45 至下午
    chapter: ch019
    location_id: abyss-echo-research-institute
    event: 林遠首次抵達舊城區的淵聲研究所，認識蘇臨並與所長碰面，確認自己將接手紙本資料整理與數位化前置工作。
    state_change: 淵聲研究所線正式開啟，林遠進入全新的人際與情報環境。

  - day: 2025/10/21 (Tuesday) to 2025/10/24 (Friday)
    time_of_day: 工作日白天至週五傍晚
    chapter: ch020
    location_id: abyss-echo-research-institute
    event: 林遠在研究所整理大量帶有「念」的異常聲波紙本檔案，蘇臨指出阿爾迪爾近兩年的異常「聲源」越來越集中，像有什麼正在醒來。
    state_change: 林遠開始正式接觸研究所情報內容，研究所線從職場適應推進到城市異常線索。

  - day: 2025/10/24 (Friday)
    time_of_day: 傍晚返家後
    chapter: ch020
    location_id: lin-yuan-apartment
    event: 林遠結束一週資料地獄後回家，燼宣稱自己找到工作，並暗示之後會以另一種方式與林遠再見。
    state_change: 燼的外部行動轉為明確伏筆，可能和林遠新工作場域交會。

  - day: 2025/10/24 (Friday)
    time_of_day: 深夜
    chapter: ch021
    location_id: late-night-noodle-stall
    event: 林遠疲憊外出吃熱湯麵補充熱量，短暫找回普通生活感。
    state_change: 深夜日常場景成為第二次妖魔事件的前奏。

  - day: 2025/10/24 (Friday)
    time_of_day: 午夜前後
    chapter: ch021
    location_id: lakefront-park
    event: 林遠在湖邊公園遭遇白霧、魚腥味與三隻水棲低階妖魔襲擊，靠本能銀光防護甩開怪物並逃向便利商店。
    state_change: 林遠再次被妖魔鎖定，確認自身吸引力與危險範圍正在擴大。

  - day: 2025/10/24 (Friday)
    time_of_day: 深夜稍後
    chapter: ch022
    location_id: convenience-store-incident-site
    event: 水棲妖魔追入便利商店，造成店員重傷與店內恐慌；林遠在燼的遠端提示後調動淵念，將銀光覆蓋掃帚並斬殺妖魔。
    state_change: 林遠首次主動將淵念附著於物件戰鬥，但也在世俗現場留下大量異常痕跡。

  - day: 2025/10/24 (Friday)
    time_of_day: 深夜事件後
    chapter: ch022
    location_id: convenience-store-incident-site
    event: 未具名修女與和尚抵達現場，判斷妖魔為化形期初期，並準備呼叫善後組進行急救與目擊者認知重建。
    state_change: 獵魔殿體系首次在正文登場，林遠的淵念痕跡成為潛在追查線索。

  - day: 2025/10/24 (Friday)
    time_of_day: 深夜返家後
    chapter: ch023
    location_id: lin-yuan-apartment
    event: 林遠慌亂返家，燼說明獵魔殿會處理超自然事故、清場、干預監控與洗腦目擊者，並警告契約者可能被視為墮落者淨化。
    state_change: 林遠的威脅來源從妖魔擴大到超自然秩序本身。

  - day: 2025/10/24 (Friday) to 2025/10/25 (Saturday)
    time_of_day: 深夜至凌晨
    chapter: ch024
    location_id: lin-yuan-apartment
    event: 戰鬥後陰陽失衡再次爆發，林遠與燼完成第二次完整陰陽調和。
    state_change: 契約依賴與身體代價加深，林遠的肉體成長再次被推動。

  - day: 2025/10/25 (Saturday)
    time_of_day: 早上
    chapter: ch025
    location_id: lin-yuan-apartment
    event: 林遠醒來後全身疼痛，燼餵早餐並以治癒術緩解疼痛；林遠發現胸口與身形再次成長。
    state_change: 第二次調和後的身體成長被林遠主動歸納成規律，日常偽裝壓力進一步增加。

  - day: 2025/10/25 (Saturday)
    time_of_day: 早上稍後
    chapter: ch025
    location_id: lin-yuan-apartment
    event: 林遠與燼討論獵魔殿風險，並在燼指導下第一次看見自己外洩的淵念，學會收束一小段氣息。
    state_change: 林遠正式進入能力訓練期，從被動逃生轉向有限度的主動隱匿與自保。

continuity_notes:
