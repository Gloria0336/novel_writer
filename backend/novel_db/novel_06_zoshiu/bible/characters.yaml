      高挑修長的成熟女性，身高170 cm，穿上高跟鞋型咒具後約177 cm。淺奶茶棕色短鮑伯落在鎖骨上方，
      髮尾微微內彎；白皙暖色膚、鵝蛋臉、金琥珀色瞳孔與淡暗金眼線讓她更像時尚模特或藝術工作者，
      而非傳統咒術師。常穿黑色無袖高領連身長裙、金色星形項鍊、金色動物造型髮髻與高跟鞋型咒具。
    appearance_current: >
      平時氣質和藹、慵懶、靦腆，步伐鬆散卻幾乎無聲；進入戰鬥後轉為極端冷靜理性，重心穩定，
      每一步都像落在精準節拍上，髮尾、裙擺、高跟鞋與水輪會共同強化「正在跳舞」的視覺印象。
    personality:
