    supplemental: |
      # 咒術迴戰 原創角色設定集：白川 澪
      
      ---
      
      # 基本資料
      
      ## 姓名
      **白川 澪**  
      **しらかわ みお**  
      **Shirakawa Mio**
      
      ---
      
      ## 身份
      - 禪院家外姓旁支出身
      - 女性
      - 原為禪院家成員，後脫離家族
      - 現為自由術師
      - 高專臨時協力者
      - 咒術師等級：一級術師
      
      ---
      
      ## 年齡
      **26歲**
      
      ---
      
      ## 生日
      **3月21日**
      
      出生於春分附近，象徵白晝與黑夜的交界、季節流向的轉換，以及壓抑後的重生。  
      她的術式能將戰場拖入無邊常夜，卻也能在最後讓暴走的水輪化為春雨散開。
      
      ---
      
      ## 人生節點
      - 19歲離開禪院家
      - 離開後改回自己的外姓「白川」
      - 成為舞蹈家後，第一次真正理解自己的術式
      - 之後以自由術師身分活動
      
      ---
      
      # 角色核心概念
      
      她是一名：
      
      > **「以舞蹈般的流動建立不可逆流勢的術師。」**
      
      其術式並非瞬間爆發型，  
      而是透過連續動作、節奏、步伐與重心轉移，逐漸形成一股越來越龐大的「流」。
      
      戰鬥時間越久，  
      她就越接近真正的災害。
      
      ---
      
      # 角色一句話概括
      
      > **白川澪，是以舞蹈般的步伐建立不可逆流勢的自由術師。她曾被禪院家視為工具，卻在離開後取回自己的名字，將被否定的術式轉化為一支會殺人的水之舞。**
      
      ---
      
      # 外觀設定
      
      ## 整體氣質
      - 不像咒術師，更像時尚模特或藝術工作者
      - 成熟、優雅、冷艷
      - 具有都市感與高級感
      - 平時氣質和藹、慵懶、靦腆
      - 戰鬥時轉變為極端冷靜與理性的狀態
      
      ---
      
      ## 身材與外貌
      - 身高：170 cm
      - 穿上高跟鞋型咒具後約177 cm
      - 高挑修長
      - 成熟沙漏型身材
      - 白皙暖色膚
      - 五官精緻
      - 鵝蛋臉輪廓
      - 金琥珀色瞳孔
      - 表情通常冷淡平靜
      
      ---
      
      ## 髮型
      - 淺奶茶棕色短鮑伯
      - 長度約鎖骨上方
      - 髮尾微微內彎
      - 帶一點鬆散、柔軟的流動感
      
      平時看起來慵懶柔和，  
      戰鬥時髮尾會隨旋身、步伐與水輪擺動，強化她「像在跳舞」的視覺印象。
      
      ---
      
      ## 聲線
      - 平時聲音低柔
      - 語速偏慢
      - 帶一點不擅長主動開口的遲疑感
      - 戰鬥時聲音變得極輕，像低語
      - 戰鬥時幾乎沒有情緒起伏
      
      她不是會大聲喊招式的人。  
      越安靜，越危險。
      
      ---
      
      ## 走路習慣
      - 平常步伐鬆散但無聲
      - 看起來像沒有特別用力，帶有慵懶感
      - 進入認真狀態後，重心完全穩定且有力
      - 每一步都像精準落在節拍上
      
      她的步伐本身就暗示著術式。  
      不是突然進入戰鬥才變強，而是平時就無意識地維持著流動。
      
      ---
      
      ## 妝容
      - 乾淨清透的淡粉妝
      - 妝感柔和、不具攻擊性
      - 眼尾有淡淡的暗金色眼線
      - 暗金眼線會在轉頭或垂眼時微微反光
      - 凸顯金琥珀色瞳孔的神祕感與反差
      
      ---
      
      ## 身體細節
      - 腿部線條明顯
      - 腳踝、膝蓋與腰線具有舞蹈訓練留下的柔韌感
      - 身上有少量禪院家時期留下的舊傷
      - 傷痕多半位於衣服會遮住的位置
      - 她不主動讓人看見這些傷
      
      ---
      
      ## 服裝
      - 黑色無袖高領連身長裙
      - 雙側高衩設計
      - 布料具有高級絲質垂墜感
      - 金色星形項鍊
      - 金色動物造型髮髻
      - 高跟鞋型咒具
      
      整體外觀不像傳統咒術師，  
      更接近高級時裝、舞台服裝與戰鬥服之間的混合。
      
      ---
      
      # 性格設定
      
      ## 日常狀態
      - 慵懶
      - 和藹
      - 溫柔
      - 靦腆
      - 有些害羞
      - 不擅長主動表達自己
      - 很會照顧人
      - 不擅長拒絕他人的請求
      
      她平時不太像危險人物。  
      說話很輕，做事很安靜，常常像漂亮但有點神祕的大姊姊。
      
      ---
      
      ## 戰鬥狀態
      - 極度冷靜
      - 幾乎沒有情緒波動
      - 不浪費任何動作
      - 說話音量很小，像低語
      - 像正在跳舞而不是戰鬥
      - 行動精準、穩定、有力
      
      ---
      
      ## 角色內核
      
      她真正危險的地方並不是暴力。  
      而是：
      
      > **她其實很享受逐漸失控的感覺。**
      
      當術式完全展開時，  
      她會產生：
      
      > **「乾脆讓一切都被洪流沖走吧。」**
      
      的念頭。
      
      但每一次，  
      她最後都會親手把洪流收回。
      
      她不是因為失控而停止，  
      而是因為她選擇停止。
      
      ---
      
      # 喜好與厭惡
      
      ## 喜歡的東西
      
      ### 漂亮的鞋子與飾品
      她喜歡漂亮的鞋子與精緻飾品。  
      這不只是愛美，而是和她的人生轉折有關。
      
      在禪院家時，她曾被當成「花瓶」或「工具」看待，  
      漂亮對她來說曾經是一種被控制、被評價的東西。
      
      離開後，她重新選擇自己的服裝、鞋子和飾品，  
      代表她把「漂亮」拿回自己手裡。
      
      > 她喜歡漂亮的鞋子，不是為了討好任何人，而是因為那是她離開禪院家後，第一次能夠自己選擇如何站立、如何行走、如何被看見。
      
      ---
      
      ### 下雨天
      她喜歡下雨天，尤其是細雨。
      
      雨聲能掩蓋城市的噪音，  
      也讓她感覺世界短暫變得柔軟。
      
      比起暴雨，  
      她更喜歡春雨那種不急不躁、慢慢落下的聲音。
      
      ---
      
      ## 討厭的東西
      
      ### 被命令
      她討厭被命令，尤其是那種不把她當成一個人，而是把她當成工具使喚的語氣。
      
      平時她不太會明顯發怒，只會變得更安靜，聲音更低。  
      熟悉她的人會知道，這代表她已經非常不舒服。
      
      ---
      
      ### 被人突然碰觸肩膀或手腕
      她不喜歡別人突然碰她的肩膀或手腕。
      
      因為小時候在禪院家，  
      她經常被人用抓住手腕、按住肩膀的方式叫去做事。
      
      即使現在已經不再害怕，  
      她的身體仍會比意識更快做出反應。
      
      ---
      
      # 成長經歷
      
      ## 禪院家時期
      
      白川澪出身於禪院家外姓旁支。  
      她雖被納入禪院家的體系之中，卻從未被真正視為核心成員。
      
      她的術式因過於抽象而不被理解。  
      再加上：
      
      - 外姓
      - 女性
      - 旁支
      
      因此她被視為：
      
      - 沒有價值
      - 難以培養
      - 不穩定
      - 不適合成為主力術師
      
      甚至：
      
      - 無法正常接受完整教育
      - 不被允許接觸核心術式理論
      - 被視為「花瓶」
      - 曾被直系當作奴僕般使喚
      
      這段經歷使她：
      
      - 習慣壓抑自己
      - 不擅長表達需求
      - 對自身術式產生厭惡
      - 對命令式語氣產生本能性不適
      - 對被抓住手腕或按住肩膀有反射性排斥
      
      ---
      
      ## 人生轉折
      
      19歲時，她離開禪院家。  
      離開後，她改回自己的外姓「白川」。
      
      她曾經被迫以「禪院家旁支」的身分被管理、使喚與看待，  
      但離開禪院家後，她取回自己的名字。
      
      > 她不是「禪院家的女人」。  
      > 她是取回自己名字的人。
      
      離開禪院家後，  
      她成為了一名舞蹈家。
      
      也正是在那時：
      
      > **她第一次真正理解了自己的術式。**
      
      她發現術式的本質並不是：
      
      - 強迫
      - 控制
      - 暴力
      
      而是：
      
      > **「流動。」**
      
      她開始學會順著流勢前進。  
      從那之後，她開始真正喜歡「水輪舞」。
      
      ---
      
      # 高專與術師圈定位
      
      ## 現在的身分
      - 自由術師
      - 一級術師
      - 偶爾接受高專委託的臨時協力者
      
      她並非高專教師，也不是固定協力人員。  
      只是因為五條悟經常死纏爛打，把她半哄半騙地拉來處理高專相關任務，  
      所以她偶爾會以臨時協力者的身分出現在學生面前。
      
      她和冥冥一樣會偶爾接受五條委託，  
      但動機不同。
      
      冥冥是因為有利益就接。  
      白川澪則是本來想拒絕，  
      但五條太煩，最後還是被拖來。
      
      ---
      
      ## 學生眼中的她
      - 漂亮、溫柔、神祕的前輩
      - 像五條認識的漂亮大姊姊
      - 說話很輕
      - 態度溫柔
      - 會照顧學生
      - 學生尚未真正看過她戰鬥
      - 因為她極少出手，學生很難把她和一級術師聯想在一起
      
      ---
      
      # 術式設定
      
      # 術式名稱
      
      ## 水輪舞
      
      ---
      
      # 術式核心規則
      
      > **「連續的動作會形成『流勢』，流勢不可逆轉。」**
      
      透過：
      
      - 舞蹈
      - 步伐
      - 重心移動
      - 肢體流動
      
      逐漸建立：
      
      - 慣性
      - 咒力流
      - 空間流向
      - 壓力場
      
      戰鬥時間越久，  
      術式就越強。
      
      ---
      
      # 術式本質
      
      術式會在她周圍生成：
      
      ## 水輪
      
      水輪並非真正的水。  
      而是：
      
      > **「被流勢具現化的液態咒力。」**
      
      其性質介於：
      
      - 水流
      - 壓力
      - 慣性
      - 刀刃
      
      之間。
      
      ---
      
      # 戰鬥風格
      
      ## 類型
      - 高速機動型
      - 技巧型
      - 中距離壓制型
      - 近戰輔助型
      - 越戰越強型
      
      ---
      
      ## 核心戰鬥概念
      
      ### 前期
      - 建立流勢
      - 擴散水輪
      - 建立河道
      
      ### 中期
      - 壓制空間
      - 擾亂敵方節奏
      - 讓戰場逐漸被流勢覆蓋
      
      ### 後期
      - 流勢近乎失控
      - 整個戰場被拖入她的節奏
      - 水輪開始形成真正洪流
      
      ---
      
      # 遠程戰鬥
      
      她並非直接發射咒力炮。  
      而是：
      
      - 讓咒力像潮水般流動
      - 形成覆蓋式壓迫
      - 改變戰場流向
      
      敵人會逐漸：
      
      - 被壓制
      - 行動遲滯
      - 難以維持穩定
      
      ---
      
      # 近戰戰鬥
      
      她是一名：
      
      ## 舞踏式腿術術師
      
      主要以腿法戰鬥。
      
      因為：
      
      - 術式依賴重心
      - 流勢依賴步伐
      - 水輪依賴肢體流動
      
      她真正強大的地方是：
      
      > **「移動本身就是攻擊。」**
      
      ---
      
      # 術式限制
      
      ## 1. 節奏不能中斷
      術式依賴持續流動。
      
      若節奏被打斷：
      
      - 流勢崩潰
      - 累積歸零
      - 術式效率暴跌
      
      ---
      
      ## 2. 動作必須完整
      術式動作不可強制停止。
      
      否則：
      
      - 咒力逆流
      - 慣性反噬
      - 身體失衡
      
      ---
      
      ## 3. 無法違逆流向
      已形成的流勢不可強制逆轉。
      
      例如：
      
      - 高速狀態下難以急停
      - 已形成的攻擊無法瞬間改向
      - 流勢越強越難停止
      
      因此，  
      她越強，  
      也越接近失控。
      
      ---
      
      # 咒具設定
      
      ## 主咒具：高跟鞋型咒具
      
      ### 功能
      - 強化腿部咒力輸出
      - 穩定河道
      - 加速流勢建立
      
      ### 可用於
      - 高速踢擊
      - 水輪爆發
      - 地面流勢構築
      - 壓力貫穿
      
      高跟鞋型咒具使她戰鬥時身高約177 cm。  
      鞋跟落地的聲音，也常成為她術式節奏開始的訊號。
      
      ---
      
      ## 副咒具：髮髻型咒具
      
      外觀看似裝飾品。
      
      ### 功能
      - 壓縮咒力
      - 瞬間濃縮流勢
      - 進行近距離爆發攻擊
      
      ### 適合
      - 突襲
      - 貫穿
      - 瞬殺
      
      ---
      
      # 招式體系
      
      # 基礎術式
      
      ## 漣步
      高速移動技。
      
      透過河道高速滑行，  
      可用於：
      
      - 閃避
      - 突進
      - 空中轉向
      
      ---
      
      ## 潮刃
      遠程水刃斬擊。
      
      軌跡如潮水般彎曲，  
      極難預測。
      
      ---
      
      ## 流環
      水輪高速旋轉形成防禦流。
      
      可：
      
      - 偏移攻擊
      - 卸除衝擊
      - 近距離切割敵人
      
      ---
      
      ## 河道
      建立流勢軌道。
      
      可：
      
      - 強化移動
      - 加速流勢循環
      - 提升累積效率
      
      ---
      
      # 中階術式
      
      ## 渦流
      多重水輪共振。
      
      形成：
      
      - 範圍壓制
      - 流勢拖曳
      - 行動遲滯
      
      ---
      
      ## 汐返
      利用流勢偏轉敵方攻擊，  
      並將動能重新導回。
      
      ---
      
      ## 瀧落
      透過河道瞬間加速。
      
      以腿法與壓縮水輪：
      
      - 貫穿
      - 重壓
      - 高速踢擊
      
      ---
      
      # 奧義／必殺技
      
      ## 水葬
      大範圍流勢崩解。
      
      大量水輪同步壓縮與釋放，  
      形成洪流般的範圍斬擊。
      
      ---
      
      ## 千汐
      大量微型水輪高速散射。
      
      形成近乎無法閃避的：
      
      ## 刃雨
      
      ---
      
      ## 無聲川
      將所有流勢壓縮為一道極細水刃。
      
      安靜到幾乎沒有聲音。  
      但能直接切開：
      
      - 咒力
      - 防禦
      - 流向
      
      ---
      
      # 術式反轉
      
      # 反轉術式・逆瀧
      
      ---
      
      ## 核心概念
      
      原本的「水輪舞」是：
      
      > **以連續動作建立不可逆的流勢。**
      
      而「逆瀧」則是：
      
      > **將已經形成的流勢壓回其來源，使咒力、動能與術式流向在對方體內或術式內部逆向翻湧。**
      
      它不是普通的反彈。  
      而是把「流」強制壓回源頭，讓對方自己承受那股逆向崩壞。
      
      ---
      
      ## 效果一：內部破壞
      
      她在近戰命中後，  
      並不是單純把敵人踢飛，  
      而是將水輪的流勢壓入敵人體內，再逆向翻湧。
      
      外傷不一定明顯，  
      但敵人體內的咒力循環、肌肉張力、臟器壓力與動作慣性會被強制逆流，  
      造成由內向外的破壞。
      
      ---
      
      ## 效果二：術式干涉
      
      在條件成熟時，  
      她可以將敵方術式的咒力流向壓回施術者身上。
      
      但逆瀧無法無條件破解術式。  
      她必須先透過「河道」捕捉到敵方術式的流向，  
      並消耗自身累積的流勢，  
      才能在極短時間內讓敵方術式產生回灌。
      
      效果是：
      
      - 讓敵方術式短暫逆流
      - 造成術式失衡
      - 使咒力回灌
      - 讓施術者短暫咒力紊亂
      
      它不是永久破壞術式，  
      而是短時間製造破綻。
      
      ---
      
      ## 使用限制
      
      ### 1. 必須先建立河道
      逆瀧不能開場使用。  
      她必須先讓戰場出現可供流勢循環的「河道」。
      
      ---
      
      ### 2. 必須消耗已累積流勢
      逆瀧會把她原本累積起來的流勢反向壓出。  
      一旦使用，水輪舞的累積會大幅下降，甚至接近歸零。
      
      使用逆瀧等於是在選擇：
      
      > 是否要放棄自己已經建立好的優勢。
      
      ---
      
      ### 3. 使用後身體短暫僵硬
      因為逆瀧會強制中斷流勢，  
      對她自己的身體也是一種逆流反噬。
      
      使用後，她的腳踝、膝蓋與腰部會出現短暫僵硬，  
      像舞者突然被迫停在錯誤的拍點上。
      
      這段時間雖然不長，  
      但對高階戰鬥來說非常危險。
      
      ---
      
      # 領域展開
      
      # 領域展開・常夜水鏡
      
      ---
      
      ## 類型
      開放性領域。
      
      以放棄封閉結界為代價，  
      換取超大範圍。
      
      ---
      
      ## 範圍
      半徑約一公里。
      
      ---
      
      ## 領域手印
      
      雙手以蘭花指交疊於胸前，  
      指節柔軟錯開，  
      像舞蹈起手式，  
      又像是在胸前結成一面小小的水鏡。
      
      她不會用力結印，  
      而是以極輕、極慢的動作讓指尖交疊。
      
      手印完成的瞬間，  
      高跟鞋鞋跟輕敲地面，  
      裙擺如黑色水面向外展開，  
      腳下的地面化為無邊夜海。
      
      ---
      
      ## 領域景象
      - 地面覆蓋淺水水面
      - 空氣中充滿白色咒力薄霧
      - 上空為星空
      - 整體像無邊際夜海
      - 美麗、安靜、異常
      
      ---
      
      ## 領域效果
      
      ### 對敵人
      - 持續吸取咒力
      - 行動速度下降
      - 術式效果受到壓制
      - 禁止飛行
      - 被逐漸拖入領域建立的流勢
      
      敵人停留越久，  
      越難脫離她的節奏。
      
      ---
      
      ## 開領域畫面
      
      她垂下眼，  
      雙手以蘭花指交疊於胸前。
      
      那不像戰鬥姿勢，  
      更像舞者上台前的第一個動作。
      
      > 「領域展開。」
      
      鞋跟輕輕敲響地面。
      
      裙擺向外展開，如黑色潮汐。
      
      下一瞬，  
      地面消失，只剩一片映著星空的常夜水鏡。
      
      ---
      
      # 戰鬥演出
      
      ## 黑閃畫面
      
      她的黑閃通常不出現在拳頭上，  
      而是在旋身踢擊的瞬間發生。
      
      高跟鞋型咒具踩入河道，  
      身體順著水輪旋轉，  
      在重心完全落下的那一瞬間，  
      腳跟與咒力衝擊重疊，  
      黑色火花沿著水輪炸開。
      
      她沒有怒吼，  
      只是安靜地轉身。
      
      裙擺、高跟鞋、水輪與黑色火花在同一瞬間重疊。  
      下一秒，敵人的身體像被整條暗流踢穿。
      
      ---
      
      ## 第一次認真戰鬥
      
      她第一次在學生面前真正戰鬥，  
      發生於禪院相關事件之中。
      
      五條因為某個與禪院家殘留勢力相關的任務，  
      死纏爛打地把她拉來當高專臨時協力者。
      
      學生們一開始只以為她是五條認識的漂亮大姊姊，  
      甚至覺得她看起來不像會戰鬥的人。
      
      任務途中，禪院相關人員或咒靈術式牽涉到她過去在禪院家的經歷，  
      使她不得不親自出手。
      
      那是學生第一次知道：
      
      > 她不是被五條找來照顧人的。  
      > 她是被五條找來壓場的。
      
      ---
      
      ## 初戰畫面
      
      一開始她只是站在學生後方，  
      替受傷的人包紮，  
      低聲提醒他們不要亂動。
      
      直到對方用禪院家的語氣叫出她過去的稱呼，  
      或命令她「退下」。
      
      她的手停了一下。
      
      不是害怕，  
      而是身體比意識更快想起那段過去。
      
      然後她慢慢站起來。
      
      原本鬆散無聲的步伐，  
      第一次變得穩定、有力。
      
      高跟鞋鞋跟落地的聲音，  
      在整個空間裡響了一下。
      
      水輪開始轉動。
      
      ---
      
      ## 水輪暴走畫面
      
      水輪暴走時，  
      她的動作反而會變得比平時更輕、更美。
      
      大量液態咒力在周圍形成洪流，  
      水輪切割地面、牆體與咒靈，  
      整個戰場像被拖進一場無聲的風暴。
      
      那一刻，  
      她會短暫地產生：
      
      > **「乾脆讓一切都被沖走。」**
      
      的念頭。
      
      但最後，  
      她會停下腳步，  
      讓原本狂暴的水輪失去刀刃般的壓力，  
      化為細密的春雨散開。
      
      她不是因為失控而停止，  
      而是因為她選擇停止。
      
      ---
      
      # 人物關係
      
      ## 五條悟
      
      ### 五條對她的態度
      五條悟完全不怕她，甚至經常故意捉弄她。
      
      他會突然出現在她旁邊，  
      誇張地稱讚她今天像高級時裝秀走錯棚，  
      或故意把麻煩任務塞給她，  
      然後用一副理所當然的表情說：
      
      > 「拜託啦，妳最適合了嘛。」
      
      她通常不太會反擊，  
      只會露出困擾的表情，低聲說：
      
      > 「五條先生……請不要這樣。」
      
      但如果五條太過火，  
      她會真的踢他。
      
      問題是，  
      五條越被踢越開心。
      
      ---
      
      ### 她對五條的態度
      她不是討厭五條，  
      而是覺得他很麻煩。
      
      但她也知道五條不是惡意。
      
      她對五條的態度介於困擾與縱容之間。  
      她不擅長拒絕五條的請求，  
      也不太能應付他的死纏爛打，  
      所以常常莫名其妙就被拉去幫忙。
      
      她嘴上會小聲抱怨，  
      實際上卻還是會把事情做完。
      
      ---
      
      ## 禪院直哉
      
      ### 直哉對她的態度
      禪院直哉從小就看不起她。
      
      對他而言，  
      她不是值得培養的術師，  
      也不是能站在直系面前說話的禪院家成員，  
      而是外姓旁支送進來、可以被使喚的工具。
      
      即使她後來成為一級術師，  
      直哉也不願承認她的實力。
      
      因為一旦承認她，  
      就等於承認禪院家曾經看錯了人，  
      也承認一個被他視為工具的人，  
      竟然能靠自己走出禪院家的支配。
      
      ---
      
      ### 她對直哉的態度
      她理性上已經不再畏懼直哉。
      
      但聽見直哉用過去那種命令式語氣叫她時，  
      她的肩膀仍會在極短一瞬間僵住。
      
      不是因為她打不過他，  
      而是因為身體比意志更早記住了恐懼。
      
      ---
      
      ### 兩人的衝突核心
      
      > 直哉認為她永遠只是禪院家的工具。  
      > 她則用自己的存在證明：工具也可以自己選擇流向。
      
      ---
      
      ## 高專學生
      
      學生們對她的印象多半停留在：
      
      - 漂亮
      - 溫柔
      - 神祕
      - 像五條認識的大姊姊
      - 不像會戰鬥的人
      
      她很會照顧人，  
      也不會用前輩姿態壓人。
      
      她可能會安靜地幫學生整理衣領、包紮傷口，  
      或在對方緊張時低聲提醒呼吸。
      
      因為她極少出手，  
      學生對她的實力反而沒有實感。
      
      ---
      
      # 術師圈評價
      
      ## 「看不出來是近戰術師。」
      
      因為：
      
      - 外表太安靜
      - 太像模特
      - 不像戰士
      
      但真正近身後才會發現：
      
      > 她的步伐本身就是術式。
      
      ---
      
      ## 「不能跟她打持久戰。」
      
      因為：
      
      - 她會越來越快
      - 越來越流暢
      - 越來越難阻止
      
      戰鬥越久，  
      整個戰場都會變成她的河道。
      
      ---
      
      ## 「她不像在戰鬥。」
      
      而像：
      
      > **「正在跳一支會殺人的舞。」**
      
      ---
      
      # 代表台詞
      
      ## 溫柔型
      > 「沒事的，慢慢呼吸。水會自己找到出口。」
      
      > 「不要急，先站穩。站得住，才走得出去。」
      
      ---
      
      ## 戰鬥型
      > 「流向，已經定下來了。」
      
      > 「下一拍，結束。」
      
      ---
      
      ## 創傷反擊型
      > 「我不是禪院家的東西。」
      
      > 「我的名字，不是給你們命令用的。」
      
      ---
      
      # 術式哲學
      
      這不是單純高速術式。
      
      而是：
      
      > **「透過連續動作，逐漸建立不可逆的洪流。」**
      
      她並非將咒力當成武器。
      
      而是：
      
      - 將自身化為「流」
      - 將戰場化為「河道」
      - 最終讓敵人無法逃離已形成的流向
      
      她的術式不是暴力本身。  
      而是讓敵人一步一步意識到：
      
      > 自己早已站在無法回頭的水流之中。
      
