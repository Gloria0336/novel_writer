      - 很會照顧人，常以安靜、低柔的方式包紮、提醒與安撫學生。
      - 戰鬥時極度冷靜，幾乎沒有情緒波動，不浪費任何動作。
      - 真正危險之處在於她其實享受流勢逐漸失控的感覺，但最後會親手把洪流收回。
      - 討厭被命令，尤其討厭被當作工具使喚的語氣；也排斥別人突然碰觸肩膀或手腕。
    speech_style:
      baseline: 低柔、語速偏慢，帶一點不擅長主動開口的遲疑感；日常說話溫柔、安靜。
      under_stress: 變得更安靜、更低，熟悉她的人會知道這代表她已非常不舒服；戰鬥時像低語，幾乎沒有情緒起伏。
      humor: 不主動開玩笑，面對五條悟時常以困擾、縱容與小聲抱怨回應。
    abilities:
      - 術式「水輪舞」：透過連續動作、舞蹈、步伐、重心移動與肢體流動建立不可逆的流勢。
      - 液態咒力「水輪」：性質介於水流、壓力、慣性與刀刃之間，並非真正的水。
      - 高速機動、技巧型中距離壓制、近戰腿術輔助與越戰越強的持久戰能力。
      - 基礎術式：漣步、潮刃、流環、河道。
      - 中階術式：渦流、汐返、瀧落。
      - 奧義／必殺技：水葬、千汐、無聲川。
      - 術式反轉「逆瀧」：將既有流勢壓回來源，使咒力、動能與術式流向在對方體內或術式內部逆向翻湧。
      - 領域展開「常夜水鏡」：開放性領域，半徑約一公里，以放棄封閉結界換取超大範圍。
      - 咒具：高跟鞋型咒具可強化腿部咒力輸出、穩定河道、加速流勢建立；髮髻型咒具可壓縮咒力與瞬間濃縮流勢。
    combat_profile:
      battle_role: >
        舞踏式腿術術師與越戰越強型戰場塑形者。她不是開場爆發型，而是用連續動作逐步建立「河道」與水輪，
        讓戰場越來越接近她的節奏；時間越久，敵人越難脫離既定流向。
      combat_style: >
        前期建立流勢、擴散水輪與河道；中期壓制空間、擾亂敵方節奏，使戰場逐漸被流勢覆蓋；
        後期流勢近乎失控，水輪形成真正洪流。她主要以腿法作戰，移動本身就是攻擊。
      technique_details: >
        「水輪舞」的核心規則是連續動作會形成不可逆轉的流勢。水輪是被流勢具現化的液態咒力，能偏移、切割、拖曳、
        形成壓力場或作為河道。反轉術式「逆瀧」需先建立河道並消耗已累積流勢，可造成內部破壞或短暫術式干涉。
      range_and_positioning: >
        中距離壓制與近戰腿術最能發揮。開闊場地有利於河道循環，走廊、庭院、屋頂或淺水地形可強化水輪軌跡。
        戰鬥時高跟鞋鞋跟落地聲常成為術式節奏開始的訊號。
      counters_and_limits: >
        節奏不能中斷，動作必須完整，已形成的流向不能強制逆轉。若節奏被打斷，流勢崩潰且累積歸零；
        若動作被迫停止，會咒力逆流、慣性反噬與身體失衡。逆瀧使用後會令腳踝、膝蓋與腰部短暫僵硬。
      scene_usage: >
        適合在禪院家相關事件、高專臨時協力任務或學生第一次見識一級術師壓場時出場。她的戰鬥應呈現美麗、安靜、
        逐步不可逆的壓迫，而不是單純水刃轟炸。
    current_status: >
      現為自由術師與一級術師，偶爾接受高專委託。不是高專教師，也不是固定協力人員；常因五條悟死纏爛打而被半哄半騙地拉去處理任務。
    progressions:
      - 19歲離開禪院家，改回自己的外姓「白川」。
      - 成為舞蹈家後，第一次真正理解自己的術式本質不是強迫、控制或暴力，而是流動。
      - 離開禪院家後，以自由術師身分活動，並逐漸把被否定的術式轉化為「會殺人的水之舞」。
    goals:
      - 以自己的名字與流向活下去，不再成為禪院家的工具。
      - 在必要時保護學生與受傷者，並把自己建立的洪流控制在可選擇停止的範圍內。
      - 用自身存在證明被視為工具的人也可以自己選擇流向。
    secrets:
      - 禪院家時期留下的舊傷多半位於衣服遮住的位置，她不主動讓人看見。
      - 她理性上已不畏懼禪院直哉，但聽見直哉用過去那種命令式語氣叫她時，肩膀仍會在極短一瞬間僵住。
      - 術式完全展開時，她會短暫產生「乾脆讓一切都被洪流沖走吧」的念頭，但她每次都選擇收回洪流。
    relationships:
