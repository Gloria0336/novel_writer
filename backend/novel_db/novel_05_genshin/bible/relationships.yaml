relationships:
  # ─── 旅行者群 ──────────────────────────────────────────────
  - pair:
      - traveler
      - paimon
    dynamic: >
      派蒙是旅行者旅途中最緊密的同伴，兼任嚮導、翻譯與情感支柱。
      她活潑好奇、直言不諱，常在旅行者沉默時代為傳話，偶爾讓旅行者顯得更神秘。
      兩人關係介於搭擋與家人之間，彼此信任卻互相吐槽。
    trust_level: 極高
    tension: 低
    conflict_points:
      - 派蒙有時過於衝動或口無遮攔，讓旅行者陷入外交困境。
      - 派蒙的真實身分目前成謎，被部分玩家推測與天理存在關聯（待確認）。
    last_updated_in: 進行中

  - pair:
      - traveler
      - sibling
    dynamic: >
      旅行者的雙胞手足選擇投身深淵，以結束天理統治為目標。
      兩人因五百年的分離而疏離，但骨肉之情從未消失。
      手足理解旅行者的善意，但認為旅行者尚未理解提瓦特真相的殘酷；
      旅行者希望重聚，但無法認可手足不惜代價毀滅一切的方式。
    trust_level: 中（情感上極深，立場上對立）
    tension: 高
    conflict_points:
      - 手足認為天理的統治必須被徹底推翻，旅行者則選擇以個別魔神任務改變世界。
      - 深淵教團的目標（包含可能傷害無辜）是旅行者無法接受的手段。
      - 重逢時機尚未到來，雙方維持著奇妙的「雙方都知道對方在哪裡」的距離。
    last_updated_in: ch05-natlan

  - pair:
      - traveler
      - dainsleif
    dynamic: >
      戴恩斯利夫是坎瑞亞末代王朝護衛，永生詛咒的承受者，也是深淵教團的追獵者。
      他在調查旅行者手足的行動，因旅行者與手足的連結而與旅行者同行。
      關係以專業合作為主，戴恩斯利夫冷靜內斂，但對旅行者明顯比對一般人多了幾分人情。
    trust_level: 中高
    tension: 中
    conflict_points:
      - 旅行者希望找回手足，戴恩斯利夫的最終目的卻可能是阻止甚至對抗手足。
      - 戴恩斯利夫對坎瑞亞的沉痛記憶使他難以對「現在的幸福」完全敞開。
    last_updated_in: chasm-interlude

  # ─── 七魔神群 ──────────────────────────────────────────────
  - pair:
      - venti
      - traveler
    dynamic: >
      溫迪（芭芭托斯）以輕佻吟遊詩人身分同行，實際上對旅行者抱有相當程度的信任。
      他欣賞旅行者的自由意志，在蒙德危機中共同拯救道瓦林。
      溫迪的角色定位是輕鬆但不失重量的嚮導型盟友。
    trust_level: 高
    tension: 低
    conflict_points:
      - 溫迪刻意遮掩神格，讓旅行者一度不確定其真實身分。
      - 神之心被奪後，溫迪是否仍具備完整神力是個開放問題。
    last_updated_in: Prologue

  - pair:
      - zhongli
      - traveler
    dynamic: >
      鍾離（摩拉克斯）以禮葬師顧問身分初識旅行者，在整個璃月事件中給予引導。
      鍾離習慣以長者的眼光觀察旅行者，對旅行者的成長有所期待。
      鍾離已卸任神格，以凡人身分生活在璃月，偶爾協助旅行者。
    trust_level: 高
    tension: 低
    conflict_points:
      - 鍾離的「無私」讓他在危機時不主動介入，有時讓旅行者在背景下陷入孤立。
    last_updated_in: ch01-liyue

  - pair:
      - raiden-ei
      - traveler
    dynamic: >
      雷電影（Ei）在元神戒令廢除後，與旅行者建立了互相尊重的關係。
      Ei 從旅行者的抗爭中重新學習「改變的必要性」，逐漸向外打開。
      兩者之間的關係從對抗演變為相互理解的同盟。
    trust_level: 中高（逐漸加深）
    tension: 低（初期衝突已化解）
    conflict_points:
      - Ei 仍有強烈的「保護稻妻」執念，在未來可能再次與旅行者的選擇產生摩擦。
    last_updated_in: ch02-inazuma

  - pair:
      - nahida
      - traveler
    dynamic: >
      納西妲（Lesser Lord Kusanali）在 500 年囚禁後，透過旅行者獲得了真正的解放。
      她對旅行者抱有深厚的情感依賴，視旅行者為「讓她回到世界的那個人」。
      兩人彼此坦誠，連外人無法直視的秘密（天空真相、Irminsul 改寫）也共同承擔。
    trust_level: 極高
    tension: 低
    conflict_points:
      - 納西妲的知識廣博但個人社交經驗匱乏，偶爾做出不符合「神祇威嚴」的行為。
    last_updated_in: ch03-sumeru

  - pair:
      - furina
      - traveler
    dynamic: >
      楓丹章中，旅行者見證了芙寧娜（福卡洛斯的人性化身）獨自承擔 500 年神格表演的重壓。
      事件結束後，芙寧娜卸下神格成為普通人，旅行者是少數理解她完整真相的人。
      關係帶有特殊的情感濃度：旅行者見過她最脆弱的樣子。
    trust_level: 高
    tension: 低
    conflict_points:
      - 芙寧娜失去神格後的新身分認同尚在適應，偶爾流露不確定感。
    last_updated_in: ch04-fontaine

  # ─── 執行官群 ──────────────────────────────────────────────
  - pair:
      - tartaglia
      - traveler
    dynamic: >
      達達利亞（Childe / Tartaglia）是旅行者第一個認識的執行官，也是最複雜的一位。
      他在璃月主動與旅行者合作（表面），但主要目的是利用旅行者引出岩神；
      事件後，兩人形成了「彼此尊重戰力、不刻意為敵」的奇妙關係。
      私下達達利亞欣賞旅行者，偶爾以不帶敵意的方式聯絡。
    trust_level: 中（情感認同高，政治立場分歧）
    tension: 中
    conflict_points:
      - 達達利亞仍是法提米成員，執行沙皇任務時可能再度與旅行者對立。
      - 其對師父斯柯爾（Skirk）的追隨可能使他捲入深淵 / 第三降臨者的更大謎局。
    last_updated_in: ch01-liyue

  - pair:
      - dottore
      - traveler
    dynamic: >
      博士（Dottore/Zandik）是旅行者遭遇的最危險對手之一。
      他以「知識」為交換籌碼從納西妲手中拿走草之神之心（及後雷之神之心），
      其實驗性格使他對旅行者充滿學術性好奇——旅行者是「有趣的變數」。
    trust_level: 極低（對立關係）
    tension: 極高
    conflict_points:
      - 博士不擇手段，視人命為實驗材料。
      - 散兵（流浪者）過去曾是博士的「版本之一」，兩人之間有未解的恩怨。
    last_updated_in: ch03-sumeru

  - pair:
      - wanderer
      - traveler
    dynamic: >
      散兵（流浪者）前身是博士以永遠哭泣少女（那由多之形象）為藍本創造的傀儡，
      在稻妻章中作為執行官對抗旅行者。後來因在須彌章中失去神之心而喪失身份定位，
      最終在旅行者（與彼得·帕克式的抉擇）的介入下選擇以新名字「流浪者」重生，
      成為旅行者的偶爾援助者（或同伴隊員）。
    trust_level: 中（持續修復中）
    tension: 低（初期衝突已化解，流浪者仍不善言辭）
    conflict_points:
      - 流浪者的過去（被博士創造、被使用、被拋棄）留下深層心理創傷，遇到相關話題仍易激動。
    last_updated_in: ch03-sumeru

  - pair:
      - pierro
      - traveler
    dynamic: >
      彼埃羅是法提米總監，坎瑞亞出身，雙眼形態與凱亞、戴恩斯利夫相似。
      目前旅行者與彼埃羅尚未正面交鋒；彼埃羅對旅行者的存在應相當清楚。
      他是整個法提米背後最神秘的謀略核心。
    trust_level: 不明（尚未直接接觸）
    tension: 潛在極高
    conflict_points:
      - 彼埃羅的真實動機是否與沙皇完全一致，目前不明。
      - 若彼埃羅也是坎瑞亞遺民，他的目標可能包含利用或操控旅行者。
    last_updated_in: 未正面登場

  # ─── 各國重要關係 ─────────────────────────────────────────
  - pair:
      - diluc
      - kaeya
    dynamic: >
      迪盧克與凱亞是童年義兄弟，父親去世後因凱亞坎瑞亞血統的秘密揭露而決裂。
      迪盧克退出騎士團以自己方式保護蒙德；凱亞留在騎士團暗中收集情報。
      表面上冷漠疏離，私下仍存在複雜的羈絆與責任感。
    trust_level: 低（表面），中（內心）
    tension: 高
    conflict_points:
      - 凱亞的真實效忠對象不確定，他的坎瑞亞血統使他持有雙重立場。
      - 迪盧克至今未完全原諒凱亞的欺瞞。
    last_updated_in: Prologue

  - pair:
      - zhongli
      - ningguang
    dynamic: >
      鍾璃（璃月港的飛天仙庭）被寧威（Ningguang）視為璃月最高榮耀的象徵；
      她在歐西爾一戰中不得不摧毀仙庭以壓制古海神。
      鍾離對寧威的犧牲表示了認可——這也是他判斷「璃月人民可以自立」的關鍵時刻。
    trust_level: 高（相互尊重）
    tension: 低
    conflict_points:
      - 寧威需要重建仙庭，在財力與政治博弈上仍需拉鋸。
    last_updated_in: ch01-liyue

  - pair:
      - neuvillette
      - furina
    dynamic: >
      那維萊特是楓丹的首席裁判官，龍族後裔，持有「水之仲裁者」的真正神格。
      福卡洛斯（Focalors）的計畫正是將水之神格歸還給那維萊特。
      芙寧娜（福卡洛斯的人性化身）與那維萊特在楓丹 500 年間保持著微妙的相互扶持關係：
      芙寧娜需要他的沉穩，那維萊特也在不知情的情況下守護著芙寧娜。
    trust_level: 高（那維萊特），中高（芙寧娜，有隱瞞）
    tension: 中（那維萊特不知福卡洛斯的完整計畫）
    conflict_points:
      - 那維萊特在事件後承受著「水之神格」的巨大壓力，以及知道芙寧娜受苦 500 年的愧疚。
    last_updated_in: ch04-fontaine

  - pair:
      - mavuika
      - capitano
    dynamic: >
      卡比坦諾以「未完成誓言的承接者」身份挑戰瑪薇卡，承認她勝利後轉而以自身力量保護納塔。
      他對瑪薇卡的態度從對立轉為複雜的尊重——視她為值得被繼承的「火之光」。
    trust_level: 低→中（事件後轉變）
    tension: 高→低（卡比坦諾犧牲後消弭）
    conflict_points:
      - 卡比坦諾已犧牲，此關係線在他死後轉為「遺志繼承」的主題。
    last_updated_in: ch05-natlan
