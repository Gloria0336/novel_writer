characters:
  # ══════════════════════════════════════════════════════
  # 旅行者群（Traveler Group）
  # ══════════════════════════════════════════════════════

  - id: traveler
    name: 旅行者（瑩）
    aliases:
      - 瑩
      - Lumine
      - 旅行者
      - 空（若選空為主角）
    role: 主角 / 降臨者 / 第四降臨者
    age: 外表約 16-17 歲；實際年齡不詳（曾被時間封印）
    occupation: 異鄉旅人；無固定身分；事實上是提瓦特各國認可的英雄
    appearance_public: >
      以瑩為例：金色長髮（雙股辮、星形髮飾）、金色眼睛、白色與米色修身旅人服裝。
      整體氣質清秀、沉靜，略帶異鄉風情，與提瓦特本地居民有微妙的不同感。
    appearance_current: >
      歷經七個國家的冒險後，外觀沒有明顯改變，但氣質更加沉穩、目光更具閱歷感。
      目前著諾德·克萊弧的旅途裝束。
    personality:
      - 沉默觀察型，很少主動發表意見，但在關鍵時刻會以行動展現立場
      - 強烈的道義感，無法對弱者或不公正視而不見
      - 對提瓦特的好奇心驅動整個旅途，但底層動力是找回手足
      - 不刻意強調「英雄」身分，卻自然而然被各地人民所信賴
    speech_style:
      baseline: 通常由派蒙代為發言；旅行者自己開口時用詞簡潔、直白，帶點外鄉口音的平靜感。
      under_stress: 更沉默，表情收緊，動作代替語言——但決意時說話格外清晰。
      humor: 乾式幽默，偶爾以一句反問或簡短評論讓派蒙無話可說。
    abilities:
      - 第四降臨者，不受 Irminsul 記錄
      - 可吸收並使用七元素（透過石像或神祇授予）
      - 戰鬥適應力極強，可與任何隊友搭配作戰
    current_status: >
      目前位於諾德·克萊，與瓦爾卡調查月之力量。手足仍在深淵，重逢遙遙無期。
    progressions:
      - at_chapter: Prologue
        status: 恢復風元素，明確旅程方向——詢問七魔神以尋找手足。
      - at_chapter: ch03-sumeru
        status: 成為唯一記得「大智慧之主盧克薩蒂」的外部見證者。
      - at_chapter: ch05-natlan
        status: 見證卡比坦諾犧牲；理解「坎瑞亞遺民的苦痛」並非只是敵對陣營的口號。
    goals:
      - 短期：探索諾德·克萊、理解月之力量
      - 長期：找回手足、了解天理的真相、讓提瓦特走向更好的命運
    secrets:
      - 作為第四降臨者，不受 Irminsul 約束——這件事的完整含義旅行者自己也未完全理解
    first_appearance: Prologue

  - id: paimon
    name: 派蒙
    aliases:
      - Emergency Food（緊急食糧，外號）
    role: 旅行者的同伴兼嚮導
    age: 不詳（外表像幼童，實際年齡成謎）
    occupation: 旅伴、翻譯、情感支柱
    appearance_public: >
      小巧的白衣少女，頭頂兩個短辮，眼睛呈金色，耳旁有金色裝飾。
      身穿白色與金色的短洋裝，能懸浮在空中。整體形象甜美可愛，辨識度極高。
    appearance_current: 同平時，無明顯改變。
    personality:
      - 活潑好動，對食物和寶石有強烈執念
      - 口直心快，常說出旅行者想說但沒說的話
      - 在危急情況下也能保持樂觀，是旅行者最重要的情感錨點
      - 表面看似孩子氣，但在關鍵時刻展現出真實的關懷與判斷力
    speech_style:
      baseline: 活潑快語，常用疊詞或誇張語氣，習慣以第三人稱稱呼自己（「派蒙覺得……」）。
      under_stress: 語氣加快、音量上升，但不失邏輯；偶爾用食物類比來緩解緊張。
      humor: 天然諧角，尤其善用自己的「緊急食糧」外號製造笑點。
    abilities:
      - 懸浮飛行
      - 語言翻譯（似乎能天生理解多種語言）
      - 真實能力上限不明
    current_status: 隨旅行者在諾德·克萊旅行。
    progressions: []
    goals:
      - 協助旅行者找到手足
      - 吃遍提瓦特所有美食
    secrets:
      - 真實身分成謎；有推測認為與天理相關，但官方未確認（見 secrets-lockbox.md）
    first_appearance: Prologue

  - id: sibling
    name: 深淵雙子（空）
    aliases:
      - 空
      - Aether（主角為瑩時的手足）
      - 深淵君主
    role: 旅行者的手足 / 深淵教團領袖 / 故事情感核心
    age: 同旅行者，外表約 16-17 歲
    occupation: 深淵教團領袖；與旅行者身世相同的降臨者候選（但未被確認為降臨者）
    appearance_public: >
      白金色短髮，金色眼睛，白色旅人服裝（與旅行者瑩的金色服相對，空為白色）。
      在深淵場景中有時以金色光芒或深淵黑暗環繞。
    appearance_current: >
      深淵教團陣地，目前狀態不明；與旅行者偶有接觸但未正式重逢。
    personality:
      - 對旅行者仍有深刻感情，但選擇了「先解放坎瑞亞遺民 / 挑戰天理」的道路
      - 對提瓦特的諸神持高度懷疑，認為天理的統治是根本惡
      - 行事冷靜而有謀略，但話語中偶爾流露出對與旅行者分離的遺憾
    speech_style:
      baseline: 沉穩低沉，語氣中有壓抑的情感；說話通常簡短而有分量。
      under_stress: 更冷靜、更決絕，壓制自己的情緒。
      humor: 罕見；偶爾對旅行者使用過去共同回憶的語氣，透出昔日輕鬆感。
    abilities:
      - 深淵力量驅動者
      - 「命運之機」建造者
    current_status: 深淵教團核心，繼續推進命運之機的計畫，與旅行者保持距離。
    progressions:
      - at_chapter: ch01-liyue
        status: 命運之機計畫浮現，以歐西爾殘肢為部件之一。
      - at_chapter: ch05-natlan
        status: 深淵大軍大規模入侵納塔，間接與手足的計畫有關。
    goals:
      - 推翻天理統治
      - 解放坎瑞亞遺民（詛咒解除）
      - （隱藏）某種形式地與旅行者重逢
    secrets:
      - 真正動機比「復仇」更深層；可能在等待一個旅行者能理解的時機
    first_appearance: Prologue（以敵對姿態出現於深淵相關劇情）

  - id: dainsleif
    name: 戴因斯雷布
    aliases:
      - 黑太子（民間稱呼）
    role: 坎瑞亞末代王朝護衛 / 深淵調查者 / 旅行者的重要同伴
    age: 外表約 25-30 歲；實際年齡 500 年以上（永生詛咒）
    occupation: 前坎瑞亞王室護衛隊長；現以獨立身份追蹤深淵教團
    appearance_public: >
      高挑金髮男性，藍色星芒狀虹膜（坎瑞亞純血特徵），右眼有黑色眼罩式遮蓋。
      穿黑色夾克配藍色細節、灰色馬甲，黑色斗篷內裡是繁星圖樣，整體透出神秘與滄桑感。
    appearance_current: 同平時，衣著未明顯改變。
    personality:
      - 寡言、沉穩，觀察入微；對初次見面者保持警戒距離
      - 對諸神與仙人持懷疑甚至輕蔑態度，認為他們對坎瑞亞的滅亡有責任
      - 對努力工作的凡人（如甘雨）有罕見的尊重
      - 永生詛咒讓他帶有特有的疲憊底色，但仍有強烈的正義感驅動他前行
    speech_style:
      baseline: 低沉平穩，用詞精準；習慣帶一句反問或未說完的停頓，暗示背後有更深的想法。
      under_stress: 更短促，刀削般直接；幾乎不允許情緒擾亂判斷。
      humor: 幾乎不說笑；偶爾有暗黑系的諷刺，但極少。
    abilities:
      - 永生詛咒（無法死亡）
      - 精熟劍術與近戰
      - 深淵力量的偵測與壓制（曾對抗被深淵污染的生物）
    current_status: 持續調查深淵教團與旅行者手足的動向，偶爾與旅行者同行。
    progressions:
      - at_chapter: chasm-interlude
        status: 正式與旅行者並肩作戰，在塵歌壺礦坑揭露深淵的更多面貌。
    goals:
      - 阻止深淵教團引發大規模破壞
      - （隱藏）找到解除坎瑞亞詛咒的方法
    secrets:
      - 他對旅行者手足（深淵領袖）的真正感情遠比表面複雜
    first_appearance: Prologue（旁白角色；正式加入 chasm-interlude）

  # ══════════════════════════════════════════════════════
  # 七魔神（The Seven Archons）
  # ══════════════════════════════════════════════════════

  - id: venti
    name: 溫迪（芭芭托斯）
    aliases:
      - 芭芭托斯
      - Barbatos
      - 蒙德吟遊詩人
    role: 蒙德風之神 / 第二代七執政 / 自由的守護者
    age: 外表約 15-16 歲；實際年齡 2600 年以上
    occupation: 表面上是蒙德城著名吟遊詩人；實際為蒙德風之神
    appearance_public: >
      雌雄莫辨的少年外貌，深翠綠的雙辮長髮配白色花冠，翠綠與白色的中世紀樂師服裝，
      胸前別一朵白色賽利西花（Cecilia），弓腰攜豎琴。
    appearance_current: >
      同平時；失去神之心後神力減弱，但仍以風元素能力守護蒙德。
    personality:
      - 隨性自由，喜歡惡作劇和厚臉皮地蹭酒喝
      - 對「自由」有深層的哲學執念——既是治國理念，也是他最深的個人傷痛（失去無名朋友）
      - 對旅行者有罕見的坦誠；是七魔神中最不喜歡擺架子的一位
      - 雖然輕鬆表面下埋著古老的悲傷
    speech_style:
      baseline: 輕佻活潑，愛用押韻或詩意語句；常以自己「只是個普通詩人」自稱來迴避嚴肅話題。
      under_stress: 收斂玩笑，語氣轉為低沉；此時說的話往往帶有千年滄桑的重量。
      humor: 豐富的語言遊戲，愛用酒類或詩歌比喻；偶爾在笑話最後留下意味深長的沉默。
    abilities:
      - 風元素魔法（神之眼版本，神之心失去後能力受限）
      - 「風神的詩篇」——音樂具有召喚與安撫風力的能力
      - 「自由的讚歌」——元素爆發，創造巨大風暴真空
    current_status: >
      神之心被史諾娜取走，目前以削弱版本的神力在蒙德生活，維持蒙德的風與自由。
    progressions:
      - at_chapter: Prologue
        status: 幫助旅行者救回道瓦林；神之心被史諾娜強取。
    goals:
      - 守護蒙德的自由
      - 長遠上：有朝一日奪回神之心，或在沒有神之心的情況下保護子民
    secrets:
      - 溫迪採用的外貌是以昔日無名友人為藍本塑造的；這份記憶是他最深的秘密
    first_appearance: Prologue

  - id: zhongli
    name: 鍾離（摩拉克斯）
    aliases:
      - 摩拉克斯
      - Morax
      - Rex Lapis（岩王帝君）
      - 璃月禮葬師顧問
    role: 璃月岩之神 / 第二代七執政 / 契約之神
    age: 外表約 25-30 歲；實際年齡 6000 年以上（最古老的七執政之一）
    occupation: 璃月旺生堂禮葬師顧問（退休神格後的身分）
    appearance_public: >
      高挑、英俊的男性，黑棕色長髮（部分束成馬尾），金色琥珀色眼睛，
      穿著融合中西元素的深色西裝套裝，配金色紋路細節，整體儒雅而權威感十足。
    appearance_current: >
      以「鍾離」身分在璃月港生活，外觀未改變，但已卸任神格，不再以摩拉克斯自稱。
    personality:
      - 沉穩、博學、老派；偏愛傳統方式，對變革持哲學態度而非抗拒
      - 深信「契約」的力量——認為文明的基礎是相互尊重的承諾
      - 對付帳的概念模糊（身為前神祇，不習慣用錢），常讓旅行者代付
      - 說話帶有一種無意識的「長者俯瞰」感，但並無惡意
    speech_style:
      baseline: 緩慢、優雅，措辭精準而古典；偏愛以歷史典故或類比來解釋現象。
      under_stress: 更加沉穩冷靜，絕不失態；必要時展現神格的壓迫感。
      humor: 極為含蓄；偶爾說出讓旅行者回想起來覺得很好笑的話，但當下一點都不像在開玩笑。
    abilities:
      - 地殼控制、岩石召喚（神之心失去後仍保有神力）
      - 「域結·玉璋」——豎立巨大石柱並賦予護盾
      - 「天星」——以隕石天擊覆壓範圍內敵人並石化
      - 以神之心製造摩拉（現已交出神之心，摩拉鑄造能力消失）
    current_status: >
      神之心交給沙皇，卸任神格，以鍾離顧問身份在璃月生活。仍持有相當的神格力量。
    progressions:
      - at_chapter: ch01-liyue
        status: 揭示真實身分，主動交出神之心，試驗璃月是否能自立。
    goals:
      - 觀察璃月的自立進程
      - 以個人身份延續對璃月的守護
    secrets:
      - 他與沙皇的契約條款細節未完全公開；他對沙皇計畫的了解程度不明
    first_appearance: ch01-liyue

  - id: raiden-ei
    name: 雷電影（Ei）
    aliases:
      - Ei
      - 巴爾澤布爾
      - Beelzebul
      - 雷電將軍（傀儡名）
      - 電神
    role: 稻妻雷之神 / 第二代七執政 / 永恆的守護者
    age: 外表約 20 歲；實際年齡 3000 年以上（繼承姊姊真姬的神格）
    occupation: 稻妻幕府最高統治者（雷電將軍代行政務；Ei 本人居住於御刀「神影」的內部世界「欣悅界」）
    appearance_public: >
      雷電將軍（傀儡）：身著深紫色繡紋武士服裝，黑髮，神情嚴肅冷漠，眼神呈無波的紫色。
      Ei（本體）：和傀儡外貌幾乎一致，但表情更有人情味，頭髮末端帶有淡紫光芒。
    appearance_current: >
      Ei 已逐漸回到外界，偶爾以雷電將軍的身分出現於稻妻公務中，但眼神比過去溫和。
    personality:
      - 傀儡（雷電將軍）：冰冷、機械式執行規則，無個人情感
      - Ei（本體）：深深恐懼「失去」——曾失去姊姊、昔日戰友，以「永恆」作為盔甲
      - 在旅行者幫助她重新理解「改變的必要性」後，逐漸敞開心扉，開始接受外界的事物
      - 對人情溫暖的反應常顯得笨拙而可愛（因為隔絕外界太久）
    speech_style:
      baseline: 雷電將軍：短促命令式，不帶情感。Ei：較緩慢、略帶古風，說話有時停頓尋找適當的現代表達。
      under_stress: 更接近傀儡模式——冷靜、精準、近乎機械；但若觸及失去的痛苦，會有短暫的空白。
      humor: 極少；若有，通常是不自知的反差笑點（認真回答無厘頭問題）。
    abilities:
      - 雷元素最高境界：「無想一刀」（Musou no Hitotachi），被視為神罰之力
      - 傀儡系統——可遠端操控雷電將軍
      - 「聖願」元素爆發：以神影喚出雷電之矛，獲得強力攻擊模式
    current_status: >
      元神戒令廢除，稻妻重新開放；Ei 正積極向外學習「改變的世界」。神之心已交給博士。
    progressions:
      - at_chapter: ch02-inazuma
        status: 被旅行者挑戰後反思「永恆」的錯誤定義，廢除元神戒令，重新開放稻妻。
    goals:
      - 守護稻妻的永恆（但以更開放的方式重新定義「永恆」）
      - 彌補元神戒令期間對稻妻人民造成的傷害
    secrets:
      - 她對姊姊真姬（Makoto，舊雷神，已死）的思念與虧欠感從未消失
    first_appearance: ch02-inazuma

  - id: nahida
    name: 納西妲（lesser lord Kusanali）
    aliases:
      - Lesser Lord Kusanali
      - 草之神
      - 布爾（Buer）
    role: 須彌草之神 / 第二代七執政 / 智慧女神
    age: 外表約 10 歲（孩童形象）；實際年齡 500 年（年紀最輕的七執政）
    occupation: 須彌草之神；學問術終端的最高管理者（囚禁解除後）
    appearance_public: >
      小巧的孩童形象，長耳（精靈耳），翠綠色長辮，白色與淡金色的典雅短裙，
      眼睛是純淨的翠綠色，整體散發溫柔而神聖的氣息。
    appearance_current: >
      正式執掌須彌，出現於公共事務中，外觀未改變。
    personality:
      - 天真好奇——在淨心之壺被囚 500 年，對世界的一切都充滿新奇感
      - 高度智識，能在夢境中讀取他人記憶與思想，對人類行為有深刻洞察
