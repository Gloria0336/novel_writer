timeline:
  # ─── 遠古時期 ───────────────────────────────────────────────
  - era: 太初
    time_of_day: 不明
    chapter: 前日談
    location_id: teyvat-origin
    event: >
      天理（法尼斯 / Phanes）從提瓦特以外降臨，成為「第一降臨者」。
      天理創造了提瓦特現行世界、七元素秩序與神之心體系，並以四色之影輔助統治。
      舊世界（前代天理秩序）被覆蓋或摧毀。
    state_change: 提瓦特七元素秩序成立；天理開始對提瓦特施加統治。

  - era: 元初七執政時期
    time_of_day: 不明
    chapter: 前日談
    location_id: teyvat-origin
    event: >
      最初的七執政被天理任命，持有對應元素的神之心。
      此時期的具體細節多已被 Irminsul 的改寫或歷史流逝所遮蔽。
    state_change: 第一代七執政制度建立。

  # ─── 魔神戰爭時期 ─────────────────────────────────────────
  - era: 魔神戰爭（約 2000 年前）
    time_of_day: 不明
    chapter: 前日談
    location_id: liyue-sea-area
    event: >
      眾魔神與神靈為奪取神之心、確立各地統治而爆發大規模戰爭。
      摩拉克斯（鍾離）在璃月封印了古海神歐西爾（Osial），確立了岩神的統治。
      芭芭托斯（溫迪）在蒙德地區平定了舊暴君神的支配，確立了風神的統治。
      此戰爭最終確立了「第二代七執政」，各執政持有當前天理賦予的神之心。
    state_change: 當前第二代七執政正式確立；各國政治雛形形成。

  # ─── 五百年前 ──────────────────────────────────────────────
  - era: 五百年前
    time_of_day: 不明
    chapter: 前日談
    location_id: khaenriah-ruins
    event: >
      坎瑞亞王國以「黃金」萊因多蒂爾為首的五罪人從旅行者雙子身上汲取了深淵力量，
      各自獲得「震動世界的力量」後卻未能團結守護坎瑞亞。
      萊因多蒂爾用深淵力量製造了大批深淵怪物，怪物圍攻坎瑞亞及提瓦特七國，引發「天災」（The Cataclysm）。
      天理（法尼斯）介入，消滅了深淵力量的湧現，坎瑞亞王國被徹底摧毀。
      倖存貴族被詛咒為永生不死；倖存平民被詛咒化為魔物（丘丘人前身）。
      天理介入後陷入沉眠，「阿斯摩迪」（未知神祇）代為管理。
    state_change: >
      坎瑞亞滅國；深淵教團形成；
      大智慧之主盧克薩蒂協助淨化 Irminsul 後被抹去記憶；
      楓丹「水之罪」預言開始計時（福卡洛斯潛伏計畫啟動）；
      旅行者雙子在此時被未知神祇分離。

  # ─── 遊戲開篇 ─────────────────────────────────────────────
  - era: 遊戲現在（遊戲開篇）
    time_of_day: 不明
    chapter: Prologue
    location_id: teyvat-origin
    event: >
      旅行者（瑩）在提瓦特旅行途中，與雙胞手足（空）被未知神祇阿斯摩迪強制分離。
      瑩失去大部分力量，被時間封印後甦醒，與派蒙相遇。
      踏上「詢問魔神、尋找手足下落」的旅途。
    state_change: 旅行者主線開始；派蒙成為同伴。

  # ─── 序章：蒙德（約 v1.0）─────────────────────────────────
  - era: 序章
    time_of_day: 不明
    chapter: Prologue
    location_id: mondstadt-city
    event: >
      旅行者抵達蒙德，受劍客迪盧克與騎士雪莉的託付，協助解決龍王道瓦林（Dvalin/Stormterror）作亂問題。
      溫迪以吟遊詩人身分出現，最終以昔日友誼召回道瓦林。
      原來溫迪正是芭芭托斯本人，但已無神之眼。
      魔神使者史諾娜趁亂以「舊債」向溫迪索取其岩之神之心（風之神之心）——
      實為沙皇收集神之心計畫的第一步。
    state_change: 蒙德危機解除；風之神之心被史諾娜帶走；執行官陰謀浮現。

  # ─── 第一章：璃月（約 v1.0-1.1）─────────────────────────────
  - era: 第一章
    time_of_day: 不明
    chapter: ch01-liyue
    location_id: liyue-harbor
    event: >
      旅行者前往璃月，遭遇「岩神之死」的葬禮儀式。
      法提米執行官「公子」達達利亞（Tartaglia/Childe）借助舊神歐西爾的印章召喚歐西爾，
      意圖引出岩神以奪取神之心。
      鍾璃（璃月港象徵）犧牲；鍾離現身，以「契約」為由主動將岩之神之心交給執行官，完成與沙皇的特殊合約。
      「岩神之死」實為假死——鍾離以摩拉克斯的身分退居，以觀察璃月能否自立。
    state_change: 岩之神之心轉交沙皇；鍾離卸任岩神；璃月人民以自治能力通過鍾離的考驗。

  # ─── 第二章：稻妻（約 v2.0-2.3）──────────────────────────────
  - era: 第二章
    time_of_day: 不明
    chapter: ch02-inazuma
    location_id: inazuma-city
    event: >
      稻妻頒布「元神戒令」，強制沒收全國神之眼。
      法提米執行官暗中推廣幻象，製造衝突。
      真正的雷電影（Ei）藏身於御刀「神影」的內部世界「欣悅界」，
      外界由她製造的傀儡「雷電將軍」代行政務。
      旅行者挑戰雷電影，使她意識到自己「求永恆」方式的偏差，廢除元神戒令。
      草薙千早（Kazuha）的故事貫穿此章；散兵（流浪者）作為執行官亮相，竊取雷之神之心。
    state_change: 元神戒令廢除；雷之神之心被博士取走；Ei 開始重新接觸外界。

  # ─── 間章：前往深淵（v2.6 Chasm）──────────────────────────
  - era: 間章
    time_of_day: 不明
    chapter: chasm-interlude
    location_id: liyue-chasm-underground
    event: >
      旅行者與戴恩斯利夫前往「塵歌壺」下的深淵礦坑探索，揭露深淵教團在此活動的痕跡。
      戴恩斯利夫提及坎瑞亞往事，旅行者首度與「深淵命令」正式接觸。
      被深淵力量控制的人物（勞維克斯等）被救出。
    state_change: 旅行者更深入了解深淵與坎瑞亞的關聯；戴恩斯利夫正式加入旅程。

  # ─── 第三章：須彌（約 v3.0-3.6）──────────────────────────────
  - era: 第三章
    time_of_day: 不明
    chapter: ch03-sumeru
    location_id: sumeru-city
    event: >
      教令院六位賢者秘密以「學問術」終端（Akasha System）操控須彌民眾，
      利用循環夢境（Samsara）讓人反覆在同一天中喪失記憶，蒐集知識解題。
      納西妲（草之神）被囚禁於「淨心之壺」500 年，教令院以不存在的前任女神取代其位置。
      旅行者協助納西妲逃脫桎梏，揭破賢者陰謀，取回 Akasha 主導權。
      納西妲以換取「天空的真相」為條件，將草之神之心交給博士（散兵作為中間人）。
      大智慧之主盧克薩蒂（前任草神）的故事揭露：她因污染被 Irminsul 抹去，
      旅行者成為唯一記得她的見證者。
      沙漠篇：阿蘇利（Apep，草之龍）的故事——古龍被禁忌知識污染，最終在旅行者幫助下得到解脫。
    state_change: >
      草之神之心轉交博士；納西妲正式重掌須彌；
      Irminsul 改寫歷史；旅行者得知「天空是假的」線索。

  # ─── 第四章：楓丹（約 v4.0-4.4）─────────────────────────────
  - era: 第四章
    time_of_day: 不明
    chapter: ch04-fontaine
    location_id: fontaine-court
    event: >
      楓丹流傳「楓丹人皆有罪、洪水將至」的古老預言。
      法庭中一個自稱水之神的「芙寧娜」（Furina）以女神身分管理楓丹 500 年，
      實際上是「福卡洛斯」將自身神性與人性分離後放置在世界上的人性化身。
      真正的福卡洛斯潛藏在「裁決之器」中，以神之心運作機器，蓄積正義之力，
      計畫在預言時刻到來時，用這把力量「處決」自己以轉移神格給那維萊特。
      旅行者揭露此計畫，洪水如期到來但楓丹人因那維萊特的「龍族原罪赦免」而存活。
      福卡洛斯被處決，神格轉歸那維萊特，水之神之心交給阿萊奇諾，芙寧娜重獲自由。
    state_change: >
      水之神之心轉交阿萊奇諾（再轉沙皇）；那維萊特正式繼承水之權能；
      芙寧娜不再是神，成為普通人；預言完成並顛覆——楓丹人沒有滅亡。

  # ─── 第五章：納塔（約 v5.0-5.x）──────────────────────────────
  - era: 第五章
    time_of_day: 不明
    chapter: ch05-natlan
    location_id: natlan-sacred-mountain
    event: >
      深淵大軍入侵納塔，聖火即將熄滅。
      火之神瑪薇卡作為提瓦特史上唯一「人類出身」的魔神，帶領部落人民以「原能」（Phlogiston）
      與深淵抗衡，展開「火之民族的壯詩」。
      執行官第一席「卡比坦諾」（Il Capitano）登場，挑戰瑪薇卡、承認她的勝利後，
      在深淵最後入侵時以自身生命力量與夜王國的古老力量融合，穩定了聖地脈絡，犧牲自身。
      他攜帶的坎瑞亞亡靈魂魄因此得到安息。
      瑪薇卡保住火之神之心，深淵暫時退潮。
    state_change: >
      卡比坦諾犧牲（執行官席位出現空缺）；火之神之心留在瑪薇卡手中；
      夜王國秘密進一步揭露；深淵大軍規模及計畫的威脅程度升級。

  # ─── 諾德·克萊弧（v6.0+，2025-09 至今）────────────────────
  - era: 諾德·克萊弧（v6.0-6.x）
    time_of_day: 不明
    chapter: ch06-nod-krai
    location_id: nod-krai-nashgorod
    event: >
      旅行者與瓦爾卡進入諾德·克萊（Nod-Krai）自治區，調查比七元素更古老的「月之力量」。
      此地域文化以斯拉夫神話為核心，當地主民信奉舊月神。
      v6.3（2026-01-14）：第三執行官科倫比娜（Columbina）首度出現於敵對情境，帶來更多至冬計畫的線索。
      v6.5（預計 2026-04）：引入「超冰原」（Hyperborea）子地區。
      至冬本篇（v7.0，預計 2026-09）尚未開始。
    state_change: 月之力量與七元素關係待解；科倫比娜的目的更加清晰；至冬最終章逼近。

continuity_notes:
  - 時間線以遊戲劇情呈現順序為主，部分遠古事件（魔神戰爭、坎瑞亞）的確切年代用「約 X 年前」表示。
  - 五百年前既是「天災」也是「楓丹預言起點」，因此多條故事線的「計時器」都設定在同一時間點。
  - 旅行者的「現在」時間基準：遊戲開篇至今（v6.x），相當於現實世界約 2020-2026 年的遊戲內容。
  - 至冬章（第七章）預計 v7.0 開啟，目前所有坎瑞亞 / 沙皇相關的最終真相尚未揭露。
